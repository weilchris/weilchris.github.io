<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow">
<title>CoMe T</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

</head>

<body>

<script>
(function(){

// ===============================
const MENU = { items: [], selected: 0 };
let LIGHTBOX_OPEN = false;

// ===============================
// STYLE
// ===============================
const style = document.createElement("style");
style.textContent = `
body{
    margin:0;
    background:black;
    font-family:"Orbitron",Arial,sans-serif;
}

#gm_menu{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    background:rgba(0,0,0,.92);
    z-index:999999;
}

.gm_btn{
    width:260px;
    height:56px;
    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:14px;
    border:2px solid rgba(120,120,120,.35);

    background:rgba(40,40,40,.75);

    color:#fff;
    font-family:"Orbitron",Arial,sans-serif;
    font-size:18px;
    font-weight:700;

    cursor:pointer;

    text-shadow:0 0 8px rgba(0,255,255,.25);

    box-shadow:
        0 0 18px rgba(0,0,0,.4),
        inset 0 0 18px rgba(255,255,255,.04);

    transition:.18s;
}

.gm_btn:hover{
    background:rgba(0,0,0,.85);
    border-color:#2aa8ff;

    box-shadow:
        0 0 10px rgba(42,168,255,.25),
        0 0 35px rgba(42,168,255,.75),
        0 0 80px rgba(42,168,255,.55),
        inset 0 0 20px rgba(42,168,255,.15);
}

.gm_btn.active{
    border-color:#2aa8ff;
    box-shadow:0 0 30px rgba(42,168,255,.6);
}

#gm_lightbox{
    position:fixed;
    inset:0;
    display:none;
    background:black;
    z-index:1000000;
}

#gm_lightbox iframe{
    width:100%;
    height:100%;
    border:none;
}

#gm_logo{
    position:fixed;
    top:50px;
    left:50%;
    transform:translateX(-50%);
    width:280px;
    height:280px;

    background:url("./assets/icon.png") center center / contain no-repeat;

    z-index:999999;
    pointer-events:none;

    filter: drop-shadow(0 0 18px rgba(42,168,255,.35));
}

@media (max-width:1024px){
    #gm_logo{
        top:-25px;
    }
}

`;

document.head.appendChild(style);

// ===============================
const menuEl = document.createElement("div");
menuEl.id = "gm_menu";
document.body.appendChild(menuEl);

const logo = document.createElement("div");
logo.id = "gm_logo";
document.body.appendChild(logo);

const lightbox = document.createElement("div");
lightbox.id = "gm_lightbox";

const frame = document.createElement("iframe");
frame.setAttribute("tabindex","-1");

lightbox.appendChild(frame);
document.body.appendChild(lightbox);

// ===============================
function open(url){
    frame.src = url;
    lightbox.style.display = "block";
    LIGHTBOX_OPEN = true;

    setTimeout(()=>{
        window.focus();
    },50);
}

function close(){
    lightbox.style.display = "none";
    frame.src = "about:blank";
    LIGHTBOX_OPEN = false;

    setTimeout(()=>{
        window.focus();
    },50);
}

lightbox.addEventListener("click",()=>{
    window.focus();
});

// ===============================
function render(){

    menuEl.innerHTML="";

    MENU.items.forEach((item,i)=>{

        const btn=document.createElement("button");
        btn.className="gm_btn"+(i===MENU.selected?" active":"");
        btn.textContent=item.label;

        btn.onclick=()=>open(item.url);

        menuEl.appendChild(btn);

    });

}

// ===============================
function add(label,url){
    MENU.items.push({label,url});
    render();
}

// ===============================
// GAMEPAD
// ===============================
let prevButtons=[];

function loop(){

    requestAnimationFrame(loop);

    const gp=navigator.getGamepads?.()[0];

    if(!gp){
        prevButtons=[];
        return;
    }

    const b=gp.buttons;

    const pressed=(i)=>b[i]?.pressed && !prevButtons[i];

    if(!LIGHTBOX_OPEN){

        if(pressed(12)){
            MENU.selected=(MENU.selected-1+MENU.items.length)%MENU.items.length;
            render();
        }

        if(pressed(13)){
            MENU.selected=(MENU.selected+1)%MENU.items.length;
            render();
        }

        if(pressed(0)){
            open(MENU.items[MENU.selected].url);
        }

    }

    if(pressed(9)){
        close();
    }

    prevButtons=b.map(x=>x.pressed);

}

// ===============================
// KEYBOARD
// ===============================
document.addEventListener("keydown",(e)=>{

    console.log("KEY:",e.key,"LIGHTBOX:",LIGHTBOX_OPEN);

    if(!LIGHTBOX_OPEN){

        if(e.key==="ArrowUp"){

            MENU.selected=(MENU.selected-1+MENU.items.length)%MENU.items.length;
            render();

        }

        if(e.key==="ArrowDown"){

            MENU.selected=(MENU.selected+1)%MENU.items.length;
            render();

        }

        if(e.key==="Enter"){

            open(MENU.items[MENU.selected].url);

        }

    }

    if((e.key==="g") && LIGHTBOX_OPEN){

        e.preventDefault();
        e.stopPropagation();

        close();

    }

},true);

// ===============================
window.addEventListener("touchstart",(e)=>{

    if(e.touches.length>=2){
        close();
    }

});

// ===============================
window.GameMenu={add,open,close,state:MENU};

// ===============================
function init(){

    render();
    loop();

    add("Time Attack","./time.html");
    add("Free Play","./free.html");
    add("Arcade Mode","./arcade.html");
    add("God Mode","./god.html");

}

init();

})();
</script>

<script>
(function () {

    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    // Mobile only
    if (!isTouch) return;

    // ---------------------------------------
    // Prevent pull-to-refresh
    // ---------------------------------------
    const style = document.createElement("style");
    style.textContent = `
        html, body {
            overscroll-behavior: none;
        }
    `;
    document.head.appendChild(style);

    let startY = 0;

    document.addEventListener("touchstart", function (e) {
        startY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchmove", function (e) {
        if (window.scrollY === 0 && e.touches[0].clientY > startY) {
            e.preventDefault();
        }
    }, { passive: false });

    // ---------------------------------------
    // Prevent back swipe / back button
    // ---------------------------------------
    history.pushState(null, "", location.href);

    window.addEventListener("popstate", function () {
        history.pushState(null, "", location.href);
    });

})();
</script>
</body>
</html>
