// ==========================================

const ship = new THREE.Group();

wing(-1);
wing(1);

fin(-1);
fin(1);

const cannonMat=new THREE.MeshBasicMaterial({

});

const cannons=[];

        new THREE.CylinderGeometry(

    c.rotation.x=Math.PI/2;

cannon(-1);
cannon(1);

// Engines

const flames=[];

function engine(side){

    const nozzle=new THREE.Mesh(

        new THREE.CylinderGeometry(

        ),

    const flame=new THREE.Mesh(

    flame.rotation.x=-Math.PI/2;

engine(-.25);
engine(.25);

scene.add(ship);
camera.position.set(0,2,10);
const keys={};onkeydown=e=>keys[e.key.toLowerCase()]=true;onkeyup=e=>keys[e.key.toLowerCase()]=false;
let tx=0,ty=0,score=0,combo=0,timeLeft=60,last=performance.now();
let timeEnabled = true;
const timeModeEl = document.getElementById("timeMode");

timeModeEl.addEventListener("change", (e) => {
    e.stopPropagation();
    timeEnabled = e.target.checked;
});
const stars=[];

const STAR_COLORS=[0xffffff,0xffffff,0xffffff,0xaaddff,0x66ffff,0xff66cc,0xaa66ff,0xffdd66];

for(let i=0;i<3200;i++){

 const giant=Math.random()<0.015;
 const radius=giant?0.45+Math.random()*0.45:0.04+Math.random()*0.12;

 let s=new THREE.Mesh(
  new THREE.SphereGeometry(radius,6,6),
  new THREE.MeshBasicMaterial({color:STAR_COLORS[(Math.random()*STAR_COLORS.length)|0]})
 );

 s.position.set((Math.random()-.5)*900,(Math.random()-.5)*500,-Math.random()*8000);

 s.userData={speed:0.4+Math.random()*1.6,twinkle:Math.random()*Math.PI*2,pulse:.5+Math.random()};

 scene.add(s);
 stars.push(s);

}
const rings=[];
function make(z){
 const t=Math.random();
 let type="good",col=0x44ffff;
 if(t>.75){type="bad";col=0xff3333;}
 if(t>.93){type="time";col=0x44ff44;}
 const g=new THREE.Group();
 const r=new THREE.Mesh(new THREE.TorusGeometry(5,.35,16,48),new THREE.MeshBasicMaterial({color:col}));
 g.add(r);g.userData={type:type,hit:false};
 g.position.set((Math.random()-.5)*35,(Math.random()-.5)*18,z);
 scene.add(g);rings.push(g);
}
for(let i=0;i<35;i++)make(-i*180);
function recycle(g){
 scene.remove(g);
 rings.splice(rings.indexOf(g),1);
 make(camera.position.z-4500-Math.random()*1000);
}
function loop(){
 requestAnimationFrame(loop);
 const now=performance.now(),dt=(now-last)/1000;last=now;
if (timeEnabled) {
    timeLeft -= dt;
    if (timeLeft <= 0) {
        gameOver = true;
        showGameOver();
    }
}
 if(keys.a||keys.arrowleft)tx-=.4;if(keys.d||keys.arrowright)tx+=.4;if(keys.w||keys.arrowup)ty+=.25;if(keys.s||keys.arrowdown)ty-=.25;
 tx=Math.max(-25,Math.min(25,tx));ty=Math.max(-12,Math.min(12,ty));
 ship.position.x+=(tx-ship.position.x)*.08;ship.position.y+=(ty-ship.position.y)*.08;
 ship.rotation.z=-ship.position.x*.04;ship.rotation.x=ship.position.y*.05;
 const sp=keys.shift?8:4;camera.position.z-=sp;ship.position.z=camera.position.z-15;
 light.position.copy(camera.position);
 camera.position.x+=(ship.position.x*.35-camera.position.x)*.05;
 camera.position.y+=((ship.position.y*.2)+2-camera.position.y)*.05;
 camera.lookAt(ship.position.x,ship.position.y,ship.position.z-100);
 stars.forEach(s=>{

 s.position.z+=sp*10*s.userData.speed;
 s.userData.twinkle+=0.03;

 const glow=1+Math.sin(s.userData.twinkle)*0.45*s.userData.pulse;
 s.scale.set(glow,glow,sp>6?6:1);

 if(s.position.z>camera.position.z){
  s.position.z=camera.position.z-8000;
  s.position.x=(Math.random()-.5)*900;
  s.position.y=(Math.random()-.5)*500;
 }

});
 rings.slice().forEach(g=>{
   g.rotation.z+=.01;
   if(!g.userData.hit&&Math.abs(g.position.z-ship.position.z)<8){
      const d=Math.hypot(ship.position.x-g.position.x,ship.position.y-g.position.y);
      if(d<5){
         g.userData.hit=true;
         if(g.userData.type==="good") {combo++;feedback("✨ PERFECT GATE","#44ffff"); Sound.gate(); score+=50*combo;g.children[0].material.color.setHex(0xffff55);}
         if(g.userData.type==="bad"){Sound.badGate(); combo=0;score=Math.max(0,score-200);g.children[0].material.color.setHex(0xff0000);}

      }else if(g.userData.type==="good"){combo=0;}
   }
   if(g.position.z>camera.position.z+20)recycle(g);
 });
 ui.innerHTML=`Score ${score}<br>Combo x${combo}<br>${timeEnabled ? "Time " + timeLeft.toFixed(1) : "Endless"}`;
 renderer.render(scene,camera);
}
loop();
onresize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
</script>
<script>
// ==========================================
// SONIC PLASMA RING WEAPON
// ==========================================

const bullets = [];

const maxBullets = 150;
let bulletsLeft = maxBullets;

let lastShot = 0;
const fireRate = 120;

function shoot(){

    if(bulletsLeft<=0) return;

    const now = performance.now();

    if(now-lastShot<fireRate) return;

    lastShot = now;
    bulletsLeft--;

    const ring = new THREE.Mesh(

        new THREE.TorusGeometry(
            0.45,
            0.10,
            16,
            48
        ),

        new THREE.MeshBasicMaterial({
            color:0xffff33,
            transparent:true,
            opacity:1
        })

    );

    // Vertical like gameplay rings
    ring.rotation.set(0,0,0);

    ring.position.copy(ship.position);
    ring.position.z -= 3;

    ring.userData = {
        speed:40,
        age:0
    };

    scene.add(ring);
    Sound.shot();
    camera.position.z+=0.25;

    const flash=new THREE.PointLight(0xffff99,10,18);
    flash.position.copy(ship.position);
    scene.add(flash);
    setTimeout(()=>scene.remove(flash),60);
    bullets.push(ring);

}

window.addEventListener("keydown",e=>{

    if(e.code==="Space"){

        e.preventDefault();
        shoot();

    }

});

const oldLoop = loop;

loop = function(){

    requestAnimationFrame(loop);

    if (window.gameGuard && !window.gameGuard()) return;

    if(gameOver){ renderer.render(scene,camera); return; }

    const now = performance.now();
    const dt = (now-last)/1000;
    last = now;

    if(timeMode.checked){

        timeLeft -= dt;

        if(timeLeft<=0){

            gameOver=true;document.getElementById("overlayScore").innerHTML="Final Score<br><b>"+score+"</b>";document.querySelector("#overlayBox h1").textContent="TIME UP";showGameOver();

        }

    }

    if(keys.a||keys.arrowleft)tx-=.4;
    if(keys.d||keys.arrowright)tx+=.4;
    if(keys.w||keys.arrowup)ty+=.25;
    if(keys.s||keys.arrowdown)ty-=.25;

    tx=Math.max(-25,Math.min(25,tx));
    ty=Math.max(-12,Math.min(12,ty));

    ship.position.x+=(tx-ship.position.x)*.08;
    ship.position.y+=(ty-ship.position.y)*.08;

ship.rotation.z=-ship.position.x*.055;

ship.rotation.x=ship.position.y*.045;

ship.rotation.y=-ship.position.x*.012;

    const sp=keys.shift?8:4;

    camera.position.z-=sp;
    ship.position.z=camera.position.z-15;

    light.position.copy(camera.position);

    camera.position.x+=(ship.position.x*.35-camera.position.x)*.05;
    camera.position.y+=((ship.position.y*.2)+2-camera.position.y)*.05;

    camera.lookAt(
        ship.position.x,
        ship.position.y,
        ship.position.z-100
    );

    stars.forEach(s=>{

        s.position.z+=sp*12;

        if(s.position.z>camera.position.z){

            s.position.z=camera.position.z-5000;
            s.position.x=(Math.random()-.5)*600;
            s.position.y=(Math.random()-.5)*350;

        }

    });

    // ==========================================
    // SONIC PLASMA UPDATE
    // ==========================================

    bullets.slice().forEach((b,i)=>{

        b.position.z -= b.userData.speed;

        b.userData.age += dt;

        const scale = 1 + b.userData.age*5;

        b.scale.set(scale,scale,1);

        b.rotation.z += 0.12;

        b.material.opacity = Math.max(
            0,
            1-b.userData.age
        );

        if(
            b.position.z<camera.position.z-3000 ||
            b.material.opacity<=0
        ){

            scene.remove(b);
            bullets.splice(i,1);

        }

    });

    // ==========================================
    // RINGS
    // ==========================================

    rings.slice().forEach(g=>{

        g.rotation.z += .01;

        if(
            !g.userData.hit &&
            Math.abs(g.position.z-ship.position.z)<8
        ){

            const d = Math.hypot(
                ship.position.x-g.position.x,
                ship.position.y-g.position.y
            );

            if(d<5){

                g.userData.hit = true;

                if(g.userData.type==="good"){

                    combo++;feedback("✨ PERFECT GATE","#44ffff");
                    score += 50*combo;
                    g.children[0].material.color.setHex(0xffff55);

                }

                if(g.userData.type==="bad"){

                    combo = 0;
                    score = Math.max(0,score-200);
                    g.children[0].material.color.setHex(0xff0000);

                }

                if(g.userData.type==="time"){

                    timeLeft += 10;
                    score += 100;

                    // refill ammo with time rings
                    bulletsLeft = Math.min(
                        maxBullets,
                        bulletsLeft + 25
                    );

                    g.children[0].material.color.setHex(0xffffff);

                }

            }else if(g.userData.type==="good"){

                combo = 0;

            }

        }

        if(g.position.z>camera.position.z+20)
            recycle(g);

    });

if (typeof updateUnlocks === "function") updateUnlocks(score);
if (typeof updateBestScore === "function") updateBestScore(score);

ui.innerHTML =
`Score ${score}<br>
Combo x${combo}<br>
Shield ${shield}/100<br>
Ammo ${bulletsLeft}/${maxBullets}<br>
${timeMode.checked?"Time "+timeLeft.toFixed(1):"Endless"}`;

// THIS LINE IS MISSING
updateAsteroids();

Sound.engine(

    keys.shift ? 8 : 4

);

// ======================================
// ENGINE ANIMATION
// ======================================

flames.forEach(f=>{

    const boost=keys.shift?2.2:1;

    const s=

        (.75+Math.random()*.35)

        *boost;

    f.scale.set(

        1,

        s,

        1

    );

});

cannons.forEach(c=>{

    c.material.color.setHex(

        bulletsLeft<20

        ?0xff8844

        :0xffff66

    );

});

renderer.render(scene,camera);

}
</script>

<script>
// ==========================================
// ASTEROID SYSTEM v4
// Real collisions + exploding asteroids
// ==========================================

let shield = 100;
let gameOver=false;

const asteroids = [];
const asteroidFragments = [];
const explosionLights=[];
const pickups=[];

// ------------------------------------------

function explodeAsteroid(pos){

    for(let i=0;i<35;i++){

        const p = new THREE.Mesh(

            new THREE.IcosahedronGeometry(.18+Math.random()*.18,0),

            new THREE.MeshBasicMaterial({
                color:Math.random()>0.5 ? 0xffaa33 : 0x777777
            })

        );

        p.position.copy(pos);

        p.userData={

            vx:(Math.random()-.5)*2,
            vy:(Math.random()-.5)*2,
            vz:-Math.random()*3-1,
            life:1.2

        };

        scene.add(p);
        asteroidFragments.push(p);

    }


    const flash=new THREE.PointLight(0xffaa33,25,60);
    flash.position.copy(pos);
    flash.userData={life:0.35};
    scene.add(flash);
    explosionLights.push(flash);

    const wave=new THREE.Mesh(
        new THREE.TorusGeometry(1,.15,12,48),
        new THREE.MeshBasicMaterial({color:0xffff66,transparent:true,opacity:1})
    );
    wave.position.copy(pos);
    wave.userData={shock:true,life:1};
    scene.add(wave);
    asteroidFragments.push(wave);
}

// ------------------------------------------

function spawnPickup(pos){

    const isShield=Math.random()<0.35;

    const p=new THREE.Mesh(
        new THREE.OctahedronGeometry(.8),
        new THREE.MeshBasicMaterial({color:isShield?0x33ccff:0xffdd33})
    );

    p.position.copy(pos);
    p.userData={
        shield:isShield,
        ammo:!isShield,
        vx:(Math.random()-.5)*0.8,
        vy:(Math.random()-.5)*0.8,
        vz:-(1+Math.random()*2),
        spin:(Math.random()-.5)*0.25
    };

    scene.add(p);
    pickups.push(p);
}

function spawnAsteroid(){

    const size=3+Math.random()*4;

    const asteroid=new THREE.Mesh(

        new THREE.IcosahedronGeometry(size,1),

        new THREE.MeshStandardMaterial({

            color:0x553300,
            emissive:0xff6600,
            emissiveIntensity:2,
            roughness:1

        })

    );

    asteroid.position.set(

        (Math.random()-.5)*28,
        (Math.random()-.5)*15,

        camera.position.z-300-Math.random()*500

    );

    asteroid.userData={

        radius:size,

        speed:7+Math.random()*3,

        rx:(Math.random()-.5)*.03,
        ry:(Math.random()-.5)*.03,
        rz:(Math.random()-.5)*.03

    };

    scene.add(asteroid);
    asteroids.push(asteroid);

}

let asteroidStorm=false;
let nextStorm=performance.now()+30000;
let stormEnd=0;

// peaceful start
if(asteroidStorm || asteroids.length<1) spawnAsteroid();


// ------------------------------------------


function updateAsteroids(){

    const now=performance.now();

    if(!asteroidStorm && now>nextStorm){
        asteroidStorm=true;
        showStormWarning();
        Sound.storm();
        stormEnd=now+15000;
        while(asteroids.length<10) if(asteroidStorm || asteroids.length<1) spawnAsteroid();
    }

    if(asteroidStorm && now>stormEnd){
        asteroidStorm=false;
        nextStorm=now+35000;
        while(asteroids.length>1){
            const a=asteroids.pop();
            scene.remove(a);
        }
    }



    // fragments

    asteroidFragments.slice().forEach((f,i)=>{

        if(f.userData.shock){
            f.scale.multiplyScalar(1.12);
            f.material.opacity-=0.04;
            if(f.material.opacity<=0){
                scene.remove(f);
                asteroidFragments.splice(i,1);
                return;
            }
        }else{
        f.position.x+=f.userData.vx;
        f.position.y+=f.userData.vy;
        f.position.z+=f.userData.vz;

        f.rotation.x+=.2;
        f.rotation.y+=.25;

        f.userData.life-=0.03;

        f.material.opacity=f.userData.life;
        f.material.transparent=true;

        }
        if(!f.userData.shock) f.userData.life-=0.03;
        if((!f.userData.shock && f.userData.life<=0)){

            scene.remove(f);
            asteroidFragments.splice(i,1);

        }

    });

    
    pickups.slice().forEach((p,i)=>{
        p.rotation.x+=p.userData.spin;
        p.rotation.y+=0.12;
        p.position.x+=p.userData.vx;
        p.position.y+=p.userData.vy;
        p.position.z+=p.userData.vz;

        const trail=new THREE.Mesh(
            new THREE.SphereGeometry(0.08,4,4),
            new THREE.MeshBasicMaterial({color:p.userData.shield?0x33ccff:0xffdd33,transparent:true,opacity:.35})
        );
        trail.position.copy(p.position);
        scene.add(trail);
        setTimeout(()=>scene.remove(trail),180);
        p.position.z+=4;
        if(Math.abs(ship.position.z-p.position.z)<10 &&
           Math.hypot(ship.position.x-p.position.x,ship.position.y-p.position.y)<2){
            if(p.userData.shield){
                shield=Math.min(100,shield+25);
                floatingMessage("+25 SHIELD","#33ccff");feedback("💙 SHIELD +25","#33ccff");
                Sound.shield();
            }else{
                bulletsLeft=Math.min(maxBullets,bulletsLeft+40);
                floatingMessage("+40 AMMO","#ffee33");feedback("🟡 AMMO +40","#ffee33");
                Sound.ammo();
            }
            scene.remove(p);
            pickups.splice(i,1);
        }
    });

// asteroids

    asteroids.slice().forEach((a,index)=>{

        a.position.z+=a.userData.speed;

        a.rotation.x+=a.userData.rx;
        a.rotation.y+=a.userData.ry;
        a.rotation.z+=a.userData.rz;

        // =============================
        // BULLETS
        // =============================

        bullets.slice().forEach((b,bi)=>{

            if(

                Math.abs(b.position.z-a.position.z)<8 &&

                Math.hypot(

                    b.position.x-a.position.x,
                    b.position.y-a.position.y

                )

                <

                a.userData.radius+1

            ){

                explodeAsteroid(a.position);
		Sound.explosion();
                score+=1000;
                floatingMessage('+1000  METEOR DESTROYED!');feedback('💥 ASTEROID DESTROYED','#ffcc55');
                if(Math.random()<0.45) spawnPickup(a.position);

                scene.remove(b);
                bullets.splice(bi,1);

                scene.remove(a);
                asteroids.splice(index,1);

                if(asteroidStorm || asteroids.length<1) spawnAsteroid();

            }

        });

        // =============================
        // SHIP CRASH
        // =============================

        if(

            Math.abs(ship.position.z-a.position.z)<12 &&

            Math.hypot(

                ship.position.x-a.position.x,
                ship.position.y-a.position.y

            )

            <

            a.userData.radius+1.8

        ){

            explodeAsteroid(a.position);
            Sound.hit();
            Sound.explosion();
            combo=0;

            shield -= 10;
            if(shield<0) shield=0;

            if(shield<=0){
                shield=0;
ui.innerHTML=`Score ${score}<br>Combo x${combo}<br>Shield ${shield}/100<br>Ammo ${bulletsLeft}/${maxBullets}<br>${timeMode.checked?"Time "+timeLeft.toFixed(1):"Endless"}`;
                gameOver=true;
                Sound.gameOver();
                showGameOver();
throw new Error("GAME_OVER");
            }

            // REAL BOUNCE

            tx+=(ship.position.x-a.position.x)*6;
            ty+=(ship.position.y-a.position.y)*4;

            camera.position.x+=(Math.random()-.5)*3;
            camera.position.y+=(Math.random()-.5)*3;

            scene.remove(a);
            asteroids.splice(index,1);

            if(asteroidStorm || asteroids.length<1) spawnAsteroid();

        }

        // =============================

        if(a.position.z>camera.position.z+40){

            scene.remove(a);
            asteroids.splice(index,1);

            if(asteroidStorm || asteroids.length<1) spawnAsteroid();

        }

    });

}
</script>
<script>
// ======================================
// ARCADE SOUND ENGINE v2
// ======================================

const Sound = {};

let audio;
let master;

function initAudio(){

    if(audio) return;

    audio = new (window.AudioContext || window.webkitAudioContext)();

    master = audio.createGain();
    master.gain.value = 0.28;
    master.connect(audio.destination);

}

async function unlockAudio(){

    initAudio();

    if(audio.state==="suspended")
        await audio.resume();

}

window.addEventListener("pointerdown",unlockAudio,{once:true});
window.addEventListener("keydown",unlockAudio,{once:true});

// ======================================
// BASIC OSCILLATOR
// ======================================

function osc(type,start,end,duration,volume=.2){

    if(!audio) return;

    const o=audio.createOscillator();
    const g=audio.createGain();

    o.type=type;

    o.frequency.setValueAtTime(start,audio.currentTime);

    o.frequency.exponentialRampToValueAtTime(
        Math.max(end,20),
        audio.currentTime+duration
    );

    g.gain.setValueAtTime(0,audio.currentTime);
    g.gain.linearRampToValueAtTime(
        volume,
        audio.currentTime+.004
    );

    g.gain.exponentialRampToValueAtTime(
        .0001,
        audio.currentTime+duration
    );

    o.connect(g);
    g.connect(master);

    o.start();
    o.stop(audio.currentTime+duration);

}

// ======================================
// SHOT
// ======================================

Sound.shot=function(){

    osc("triangle",1800,260,.08,.09);
    osc("sine",900,500,.05,.04);

}

// ======================================
// EXPLOSION
// 
// ======================================

Sound.explosion=function(){

    osc("triangle",180,40,.28,.20);
    osc("square",90,30,.36,.10);

}

// ======================================
// SHIP HITS ASTEROID
// ======================================

Sound.hit = function(){

    // Low impact
    osc("triangle",180,50,.18,.18);

    // Metallic clang
    setTimeout(()=>{

        osc("square",900,220,.08,.10);

    },12);

    // Crunch
    setTimeout(()=>{

        osc("sawtooth",450,90,.14,.05);

    },25);

}

// ======================================
// SHIELD
// ======================================

Sound.shield=function(){

    osc("triangle",700,1100,.08,.10);

    setTimeout(()=>{

        osc("triangle",900,1700,.08,.08);

    },70);

}

// ======================================
// AMMO
// ======================================

Sound.ammo=function(){

    osc("square",900,1800,.05,.08);

}

// ======================================
// GOOD GATE
// ======================================

Sound.gate=function(){

    osc("triangle",800,1600,.08,.08);

}

// ======================================
// BAD GATE
// ======================================

Sound.badGate=function(){

    osc("square",600,120,.16,.10);

}

// ======================================
// STORM
// ======================================

Sound.storm=function(){

    osc("sawtooth",220,45,.55,.20);

}

// ======================================
// GAME OVER
// ======================================

Sound.gameOver=function(){

    osc("sawtooth",700,70,.9,.14);

}

// ======================================
// LEVEL
// ======================================

Sound.level=function(){

    osc("triangle",700,1100,.08,.08);

    setTimeout(()=>{

        osc("triangle",1100,1800,.08,.08);

    },90);

}

// ======================================
// ENGINE
// ======================================

let engineOsc;
let engineGain;

Sound.engine=function(speed){

    if(!audio) return;

    if(!engineOsc){

        engineOsc=audio.createOscillator();
        engineGain=audio.createGain();

        engineOsc.type="triangle";

        engineOsc.frequency.value=80;

        engineGain.gain.value=.018;

        engineOsc.connect(engineGain);
        engineGain.connect(master);

        engineOsc.start();

    }

    engineOsc.frequency.setTargetAtTime(

        65+speed*16,

        audio.currentTime,

        .12

    );

}
</script>
<script>
// ======================================
// MOBILE + GAMEPAD SUPPORT
// ======================================

const touch = {

    active:false,
    startX:0,
    startY:0

};

// ----------------------
// TOUCH
// ----------------------

window.addEventListener("touchstart",e=>{

    touch.active=true;

    touch.startX=e.touches[0].clientX;
    touch.startY=e.touches[0].clientY;

},{passive:true});

window.addEventListener("touchmove",e=>{

    if(!touch.active) return;

    const x=e.touches[0].clientX;
    const y=e.touches[0].clientY;

    const dx=x-touch.startX;
    const dy=y-touch.startY;

    keys.arrowleft  = dx<-30;
    keys.arrowright = dx>30;

    keys.arrowup    = dy<-30;
    keys.arrowdown  = dy>30;

},{passive:true});

window.addEventListener("touchend",()=>{

    touch.active=false;

    keys.arrowleft=false;
    keys.arrowright=false;
    keys.arrowup=false;
    keys.arrowdown=false;

});

// ----------------------
// DOUBLE TAP = SHOOT
// ----------------------

let lastTap=0;

window.addEventListener("touchend",e=>{

    const now=Date.now();

    if(now-lastTap<250){

        shoot();

    }

    lastTap=now;

});

// ----------------------
// TWO FINGERS = BOOST
// ----------------------

window.addEventListener("touchmove",e=>{

    keys.shift=e.touches.length>=2;

},{passive:true});

// ======================================
// GAMEPAD
// ======================================

function updateGamepad(){

    const gp=navigator.getGamepads()[0];

    if(!gp) return;

    // Left stick

    keys.arrowleft  = gp.axes[0]<-.25;
    keys.arrowright = gp.axes[0]>.25;

    keys.arrowup    = gp.axes[1]<-.25;
    keys.arrowdown  = gp.axes[1]>.25;

    // A / Cross

    if(gp.buttons[0].pressed){

        shoot();

    }

    // Right Trigger

    keys.shift=

        gp.buttons[7] &&

        gp.buttons[7].value>.4;

}

setInterval(updateGamepad,16);

</script>

        if(score>=SECTORS[i].score){

            if(currentSector!==i){

                currentSector=i;

                enterSector(SECTORS[i]);

            }

            break;

        }

    }

    gameDifficulty.asteroidColor=sector.asteroid;
    gameDifficulty.asteroidSpeed=sector.speed;
    gameDifficulty.stormInterval=sector.storm;

    // Fog transition

    scene.fog.color.setHex(sector.fog);

    // Existing asteroids

    asteroids.forEach(a=>{

        if(a.material){

            a.material.color.setHex(sector.asteroid);

            if(a.material.emissive){

                a.material.emissive.setHex(sector.asteroid);

            }

        }

        a.userData.speed*=sector.speed;

    });

document.addEventListener("DOMContentLoaded", () => {

    </svg>
  `;

  const volumeOnSVG = `
    <svg xmlns="http://www.w3.org/2000/svg"
      width="28"
      height="28"
      viewBox="0 0 24 24"
      fill="white">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05A4.97 4.97 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>

  `;

  speakerBtn.innerHTML = volumeOffSVG;

  document.body.appendChild(speakerBtn);

  // --- Audio Player ---
  const audioPlayer = document.createElement("audio");
  audioPlayer.id = "backgroundAudio";
  audioPlayer.style.display = "none";
  document.body.appendChild(audioPlayer);

  const playlist = [
    { title: "Sundance", artist: "Tisch", src: "./assets/music/01.mp3" },
    { title: "8 Bit Super Party", artist: "Tisch", src: "./assets/music/02.mp3" },
    { title: "Flashback", artist: "Tisch", src: "./assets/music/03.mp3" },
    { title: "Dancing Lights", artist: "Tisch", src: "./assets/music/04.mp3" },
    { title: "Teddy Bear in Trance", artist: "Tisch", src: "./assets/music/05.mp3" },
    { title: "Stranger", artist: "Tisch", src: "./assets/music/06.mp3" },
    { title: "Time", artist: "Tisch", src: "./assets/music/07.mp3" },
    { title: "Mystic Monsters", artist: "Tisch", src: "./assets/music/08.mp3" },
    { title: "Hyper Horses", artist: "Tisch", src: "./assets/music/09.mp3" },
    { title: "Escape", artist: "Tisch", src: "./assets/music/10.mp3" },
    { title: "Invisible", artist: "Tisch", src: "./assets/music/11.mp3" }
  ];

  let currentIndex = Math.floor(Math.random() * playlist.length);

  const audioContext = new (window.AudioContext || window.webkitAudioContext)();

  const sourceNode = audioContext.createMediaElementSource(audioPlayer);
  const gainNode = audioContext.createGain();

  gainNode.gain.value = 0.2;

  sourceNode.connect(gainNode);
  gainNode.connect(audioContext.destination);

  function loadTrack(index) {
    const track = playlist[index];
    audioPlayer.src = track.src;
  }

  async function nextTrack() {
    currentIndex = (currentIndex + 1) % playlist.length;
    loadTrack(currentIndex);

    try {
      await audioPlayer.play();
    } catch (err) {
      console.error(err);
    }
  }

  audioPlayer.addEventListener("ended", nextTrack);

  // --- State ---
  let playing = false;
  let hasStartedMusic = false;

  // --- Start Music Once ---
  async function startMusicOnce() {

    if (hasStartedMusic) return;

    hasStartedMusic = true;

    if (audioContext.state === "suspended") {
      await audioContext.resume();
    }

    loadTrack(currentIndex);

    try {

      await audioPlayer.play();

      playing = true;

      speakerBtn.innerHTML = volumeOnSVG;

    } catch (err) {

      console.error("Playback failed:", err);

    }
  }

  // First click anywhere starts music once
  document.addEventListener(
    "pointerdown",
    startMusicOnce,
    { once: true }
  );

// First keyboard press starts music
document.addEventListener(
  "keydown",
  startMusicOnce,
  { once: true }
);

// ======================================
// First gamepad button starts music
// ======================================

let gamepadStarted = false;

function watchGamepad(){

    if(gamepadStarted) return;

    const pads = navigator.getGamepads
        ? navigator.getGamepads()
        : [];

    for(const pad of pads){

        if(!pad) continue;

        for(const button of pad.buttons){

            if(button.pressed){

                gamepadStarted = true;

                startMusicOnce();

                return;

            }

        }

    }

    requestAnimationFrame(watchGamepad);

}

watchGamepad();

  // --- Speaker Toggle ---
  speakerBtn.addEventListener("click", async (e) => {

    e.stopPropagation();

    if (!hasStartedMusic) {
      await startMusicOnce();
      return;
    }

    if (audioContext.state === "suspended") {
      await audioContext.resume();
    }

    if (playing) {

      audioPlayer.pause();

      speakerBtn.innerHTML = volumeOffSVG;

      playing = false;

    } else {

      try {

        await audioPlayer.play();

        speakerBtn.innerHTML = volumeOnSVG;

        playing = true;

        speakerBtn.animate(
          [
            { transform: "rotate(0deg)" },
            { transform: "rotate(15deg)" },
            { transform: "rotate(-15deg)" },
            { transform: "rotate(0deg)" }
          ],
          {
            duration: 300,
            iterations: 1
          }
        );

      } catch (err) {

        console.error(err);

      }
    }
  });

});

}

if(document.readyState==="loading"){

    document.addEventListener("DOMContentLoaded",init);

}else{

}

(function(){

    const box=document.createElement("div");

    box.id="bigNotification";

    box.style.cssText=`
        position: fixed;
        left: 50%;
        bottom: 90px;
        transform: translateX(-50%) scale(1);

        min-width:420px;

        text-align:center;

        font-family:Orbitron,Arial,sans-serif;
        font-size:42px;
        font-weight:900;

        color:#44ffff;

        text-shadow:
            0 0 20px currentColor,
            0 0 40px currentColor;

        pointer-events:none;

        opacity:0;

        z-index:999999;

        transition:
            opacity .18s,
            transform .18s;
    `;

    document.body.appendChild(box);

    let timer;

 window.notify = function(text, color = "#44ffff") {

    clearTimeout(timer);

    box.textContent = text;
    box.style.color = color;

    // ensure bottom positioning mode
    box.style.top = "auto";
    box.style.bottom = "90px";
    box.style.left = "50%";

    // SHOW (bottom-centered)
    box.style.opacity = "1";
    box.style.transform = "translateX(-50%) scale(1)";

    timer = setTimeout(() => {

        box.style.opacity = "0";

        // HIDE (keep same positioning logic!)
        box.style.transform = "translateX(-50%) scale(.85)";

    }, 900);
};

    // Compatibility
    window.feedback=function(text,color){

        notify(text,color);

    };

    window.floatingMessage=function(text,color){

        notify(text,color);

    };

})();
</script>

<script>
// ======================================
// COMET SAVE + SHIP SELECT SYSTEM v1
// Standalone module
// ======================================

(function(){

const SAVE_KEY = "comet_save_v1";

// ------------------------------
// SAVE STATE
// ------------------------------
const saveData = {
    bestScore: 0,
    unlockedShips: [0],
    selectedShipIndex: 0
};

let selectedShipIndex = 0;
let gameStarted = false;

// ------------------------------
// GAMEPAD STATE
// ------------------------------
let gpCooldown = 0;

// ------------------------------
// SHIPS CONFIG
// ------------------------------
const SHIPS = [
    { name: "MK-I", color: 0x66ccff },
    { name: "MK-II", color: 0xff66cc },
    { name: "MK-III", color: 0x66ff99 }
];

// ------------------------------
// LOAD / SAVE
// ------------------------------
function loadSave() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;

    try {
        const data = JSON.parse(raw);

        saveData.bestScore = data.bestScore ?? 0;
        saveData.unlockedShips = data.unlockedShips ?? [0];
        saveData.selectedShipIndex = data.selectedShipIndex ?? 0;

        selectedShipIndex = saveData.selectedShipIndex;

    } catch (e) {
        console.warn("Save corrupted, resetting.");
    }
}

function saveGame() {
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
}

// ------------------------------
// SHIP APPLY (your 3D ship)
// expects global `ship` THREE.Group
// ------------------------------
function applyShip(index) {
    if (typeof ship === "undefined") return;

    const data = SHIPS[index];

    ship.traverse(obj => {
        if (obj.material && obj.material.color) {
            obj.material.color.setHex(data.color);
        }
    });
}

// ------------------------------
// START MENU UI
// ------------------------------
const menu = document.createElement("div");
menu.style.cssText = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:999999;
    font-family:Orbitron,Arial;
    color:white;
`;

document.body.appendChild(menu);

function renderMenu() {

    menu.innerHTML = "";

    const topContainer = document.createElement("div");
    topContainer.style.cssText = `
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:20px;
`;

const logo = document.createElement("img");
logo.src = "./assets/icon.png";
logo.style.cssText = `
    width:100%;
    margin-bottom:30px;
    filter: drop-shadow(0 0 20px cyan);
`;

const highscore = document.createElement("div");
highscore.textContent = "HIGH SCORE: " + saveData.bestScore;
highscore.style.cssText = `
    font-size:22px;
    color:#44ffff;
    text-shadow:0 0 15px cyan;
    margin-bottom:10px;
`;

topContainer.appendChild(logo);
topContainer.appendChild(highscore);
menu.appendChild(topContainer);

    const title = document.createElement("div");
    title.textContent = "SELECT YOUR SHIP";
    title.style.cssText = "font-size:20px;margin-bottom:20px;";
    menu.appendChild(title);

    const row = document.createElement("div");
    row.style.cssText = "display:flex;gap:20px;";

    SHIPS.forEach((s, i) => {

        const unlocked = saveData.unlockedShips.includes(i);

        const btn = document.createElement("button");

        btn.textContent = unlocked ? s.name : "LOCKED";

        btn.disabled = !unlocked;

        btn.style.cssText = `
            padding:16px 22px;
            font-size:18px;
            border-radius:12px;
            cursor:pointer;
            background:${unlocked ? "#33bbff" : "#333"};
            opacity:${unlocked ? 1 : 0.3};
            border:none;
            color:white;
        `;

if (i === selectedShipIndex) {

    btn.style.outline = "3px solid #00ffff";
    btn.style.boxShadow = "0 0 20px cyan";
    btn.style.transform = "scale(1.08)";

}

        if (unlocked) {

btn.onclick = () => {

    selectedShipIndex = i;

    saveData.selectedShipIndex = i;

    saveGame();

    applyShip(i);

    highlight();

    renderMenu();

};
        }

        row.appendChild(btn);

    });

    menu.appendChild(row);

    const startBtn = document.createElement("button");
    startBtn.textContent = "START MISSION";
    startBtn.style.cssText = `
        margin-top:30px;
        padding:14px 30px;
        font-size:22px;
        border-radius:14px;
        background:#00ccff;
        border:none;
        cursor:pointer;
    `;

    startBtn.onclick = startGame;

    menu.appendChild(startBtn);
}

// ------------------------------
// GAMEPAD MENU CONTROLS
// ------------------------------

function moveSelection(dir){

    const unlocked = saveData.unlockedShips;

    let next = selectedShipIndex;

    do{

        next += dir;

        if(next < 0) next = SHIPS.length - 1;
        if(next >= SHIPS.length) next = 0;

    }while(!unlocked.includes(next));

    selectedShipIndex = next;

    saveData.selectedShipIndex = next;

    saveGame();

    applyShip(next);

    highlight();

    renderMenu();

}

// ------------------------------
// START GAME
// ------------------------------
function startGame() {

    gameStarted = true;
    menu.style.display = "none";

    applyShip(selectedShipIndex);

    if (window.startCountdown) {

        window.startCountdown(() => {

            if (typeof loop === "function") {
                requestAnimationFrame(loop);
            }

        });

    } else {
        // fallback
        if (typeof loop === "function") {
            requestAnimationFrame(loop);
        }
    }
}

// ------------------------------
// UNLOCK LOGIC HOOK
// call this from your main loop
// ------------------------------
function updateUnlocks(score) {

    if (score > 2000 && !saveData.unlockedShips.includes(1)) {
        saveData.unlockedShips.push(1);
        notify("🚀 MK-II UNLOCKED");
        saveGame();
    }

    if (score > 10000 && !saveData.unlockedShips.includes(2)) {
        saveData.unlockedShips.push(2);
        notify("🚀 MK-III UNLOCKED");
        saveGame();
    }

}

// ------------------------------
// SCORE SAVE HOOK
// ------------------------------
function updateBestScore(score) {
    if (score > saveData.bestScore) {
        saveData.bestScore = score;
        saveGame();
    }
}

// ------------------------------
// UI FEEDBACK
// ------------------------------
function highlight() {
    if (typeof notify !== "undefined") {

        notify();

        const el = document.getElementById("bigNotification");

        if (el) {
            el.style.zIndex = "2147483647";

            // move it higher ONLY for highlight
            el.style.top = "12%";
            el.style.transform = "translate(-50%,-50%) scale(1)";
        }
    }
}

// ------------------------------
// GLOBAL GUARD (blocks game until start)
// ------------------------------
function gameGuard() {
    if (!gameStarted) {
        if (typeof renderer !== "undefined" && typeof scene !== "undefined" && typeof camera !== "undefined") {
            renderer.render(scene, camera);
        }
        return false;
    }
    return true;
}

// ------------------------------
// INIT
// ------------------------------
loadSave();
renderMenu();
applyShip(selectedShipIndex);
highlight();

// ------------------------------
// GAMEPAD LOOP
// ------------------------------
function gamepadLoop(){

    const gp = navigator.getGamepads ? navigator.getGamepads()[0] : null;

    if (!gp) {
        requestAnimationFrame(gamepadLoop);
        return;
    }

    if (gpCooldown > 0) gpCooldown--;

// ------------------------------
// GAMEPAD MENU
// ------------------------------

if (!gameStarted) {

    // LEFT
    if (gp.buttons[14]?.pressed && gpCooldown === 0) {

        moveSelection(-1);
        gpCooldown = 15;

    }

    // RIGHT
    if (gp.buttons[15]?.pressed && gpCooldown === 0) {

        moveSelection(1);
        gpCooldown = 15;

    }

    // A = START MISSION
    if (gp.buttons[0]?.pressed && gpCooldown === 0) {

        startGame();
        gpCooldown = 25;

    }

    // START = START MISSION
    if (gp.buttons[9]?.pressed && gpCooldown === 0) {

        startGame();
        gpCooldown = 25;

    }

}

    requestAnimationFrame(gamepadLoop);
}

// start it
gamepadLoop();

// expose hooks globally
window.updateUnlocks = updateUnlocks;
window.updateBestScore = updateBestScore;
window.gameGuard = gameGuard;
window.saveData = saveData;

})();

// ==========================================
// 3 • 2 • 1 • GO! (CALLABLE VERSION)
// ==========================================

window.startCountdown = function(onComplete){

    const overlay = document.createElement("div");

    overlay.id = "countdownOverlay";

    overlay.style.cssText = `
        position:fixed;
        inset:0;
        background:#000;
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:2147483647;
        opacity:1;
        overflow:hidden;
        pointer-events:all;
    `;

    const number = document.createElement("div");

    number.style.cssText = `
        font-family:Orbitron,Arial,sans-serif;
        font-size:180px;
        font-weight:900;
        color:#44ffff;
        text-shadow:
            0 0 30px cyan,
            0 0 70px cyan,
            0 0 120px cyan;
        transition:
            transform .25s ease,
            opacity .25s ease;
    `;

    overlay.appendChild(number);
    document.body.appendChild(overlay);

    const items = ["3","2","1","GO!"];
    let index = 0;

    function showNext(){

        number.style.opacity = "0";
        number.style.transform = "scale(.5)";

        setTimeout(()=>{

            number.textContent = items[index];

            number.style.opacity = "1";
            number.style.transform = "scale(1.15)";

            if(typeof Sound !== "undefined"){
                if(index < 3) Sound.gate();
                else Sound.level();
            }

            index++;

            if(index < items.length){
                setTimeout(showNext, 850);
            } else {
                setTimeout(()=>{

                    overlay.style.transition = "opacity .45s";
                    overlay.style.opacity = "0";

                    setTimeout(()=>{

                        overlay.remove();

                        // ==========================================
                        // RESET SWITCHES AFTER COUNTDOWN
                        // ==========================================
                        const timeModeEl = document.getElementById("timeMode");
                        const godModeEl = document.getElementById("godModeSwitch");

                        if (timeModeEl) {
                            timeModeEl.checked = false;
                            timeModeEl.dispatchEvent(new Event("change", { bubbles: true }));
                        }

                        if (godModeEl) {
                            godModeEl.checked = false;
                            godModeEl.dispatchEvent(new Event("change", { bubbles: true }));
                        }

                        if(onComplete) onComplete();

                    }, 450);

                }, 800);
            }

        }, 180);
    }

    setTimeout(showNext, 200);
};
</script>

<script>
// ==========================================
// DEVICE-AWARE UI + AR MODE FIX v3
// ==========================================

(function(){

// ------------------------------------------
// 0. DEVICE DETECTION (FIXED)
// ------------------------------------------

// iPhone / small mobile phones only
const isPhone =
    /iPhone|iPod|Android.*Mobile/i.test(navigator.userAgent);

// iPad (including iPadOS "Macintosh" spoof)
const isIPad =
    /iPad/i.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

// Tablet = iPad or large touch device (but NOT phone)
const isTablet =
    isIPad || (!isPhone && navigator.maxTouchPoints > 1);

// ------------------------------------------
// 1. HIDE UI ONLY ON PHONE (NOT TABLET!)
// ------------------------------------------

function hideMobileUI(){

    const hide = () => {

        const timeToggle = document.getElementById("toggle");
        const godToggle  = document.getElementById("godToggle");

        if(timeToggle) timeToggle.style.display = "none";
        if(godToggle)  godToggle.style.display = "none";
    };

    hide();

    // watch late injections
    const obs = new MutationObserver(hide);
    obs.observe(document.body, { childList:true, subtree:true });
}

// ONLY phones get hidden UI
if(isPhone && !isTablet) hideMobileUI();

// ------------------------------------------
// 2. AR CAMERA BACKGROUND (ALL TOUCH DEVICES)
// ------------------------------------------

let arStarted = false;

async function startAR(){

    if(arStarted) return;
    arStarted = true;

    try {

        const video = document.createElement("video");
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.autoplay = true;
        video.muted = true;

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
        });

        video.srcObject = stream;
        await video.play();

        // Background layer
        const bg = document.createElement("div");
        bg.style.cssText = `
            position:fixed;
            inset:0;
            z-index:-2;
            overflow:hidden;
        `;

        video.style.cssText = `
            width:100%;
            height:100%;
            object-fit:cover;
        `;

        bg.appendChild(video);
        document.body.prepend(bg);

        // THREE.js safety
        if(typeof renderer !== "undefined"){
            renderer.setClearColor(0x000000, 0);
            renderer.domElement.style.position = "fixed";
            renderer.domElement.style.top = "0";
            renderer.domElement.style.left = "0";
            renderer.domElement.style.zIndex = "1";
            renderer.domElement.style.pointerEvents = "none";
        }

        if(typeof scene !== "undefined"){
            scene.fog = null;
        }

        document.body.style.background = "transparent";

        if(typeof notify !== "undefined"){
            notify("📱 AR MODE ACTIVE","#44ffcc");
        }

    } catch(err){

        console.warn("AR failed:", err);

        if(typeof notify !== "undefined"){
            notify("⚠️ CAMERA BLOCKED","#ff4444");
        }
    }
}

// ------------------------------------------
// 3. AUTO START ON FIRST TOUCH (ALL TOUCH DEVICES)
// ------------------------------------------

// phone + tablet both allowed
if(isPhone || isTablet){
    window.addEventListener("pointerdown", startAR, { once:true });
}

// debug hook
window.enableAR = startAR;

})();
</script>

<script>
(function () {

    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    // Only apply on touch devices
    if (!isTouch) return;

    // ---------------------------------------
    // 1. CSS HARD LOCK
    // ---------------------------------------
    const style = document.createElement('style');
    style.textContent = `
        html, body {
            margin: 0 !important;
            padding: 0 !important;

            overflow: hidden !important;

            /* kills pull-to-refresh / bounce in modern browsers */
            overscroll-behavior: none !important;

            /* disables browser gestures (zoom, pan, etc.) */

            /* iOS selection kill switch */
            -webkit-user-select: none !important;
            user-select: none !important;

            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        * {
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
        }
    `;
    document.head.appendChild(style);

    // ---------------------------------------
    // 2. BLOCK GESTURES
    // ---------------------------------------

    function prevent(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // scroll / zoom / swipe
    document.addEventListener('touchmove', prevent, { passive: false });
    document.addEventListener('touchstart', prevent, { passive: false });

    // double tap zoom / gestures
    document.addEventListener('gesturestart', prevent);
    document.addEventListener('gesturechange', prevent);
    document.addEventListener('gestureend', prevent);

    // wheel (some mobile + trackpad hybrid devices)
    document.addEventListener('wheel', prevent, { passive: false });

    // ---------------------------------------
    // 3. BLOCK SELECTION / CONTEXT MENU
    // ---------------------------------------

    document.addEventListener('selectstart', prevent);
    document.addEventListener('contextmenu', prevent);

    // long press iOS "callout"
    document.addEventListener('touchend', function(e){
        // just in case selection still triggers
        window.getSelection?.().removeAllRanges?.();
    });

    // ---------------------------------------
    // 4. STOP KEYS THAT CAN TRIGGER REFRESH
    // ---------------------------------------
    document.addEventListener('keydown', function(e) {

        // prevent pull-to-refresh / browser reload shortcuts
        if (
            e.key === "F5" ||
            (e.ctrlKey && e.key.toLowerCase() === "r") ||
            (e.metaKey && e.key.toLowerCase() === "r") ||
            e.key === "Escape"
        ) {
            e.preventDefault();
        }

    }, true);

    // ---------------------------------------
    // 5. DISABLE BACK-SWIPE (BEST EFFORT)
    // ---------------------------------------
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', function () {
        history.pushState(null, null, location.href);
    });

})();
</script>

</body></html>
