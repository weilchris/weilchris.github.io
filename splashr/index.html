import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

//////////////////////////////////////////////////////////
// BASIC
//////////////////////////////////////////////////////////

const MAP_SIZE = 180;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(

    window.innerWidth/window.innerHeight,

    1000
);

camera.position.set(0,2,5);

const renderer = new THREE.WebGLRenderer({

});

renderer.setSize(

);

renderer.setPixelRatio(

    Math.min(window.devicePixelRatio,1.5)
);

renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);

//////////////////////////////////////////////////////////
// HUD
//////////////////////////////////////////////////////////

const scoreEl =

const healthEl =
    document.getElementById('health');

const ammoEl =
    document.getElementById('ammo');


const timeEl =
    document.getElementById('time');

const levelEl =
    document.getElementById('level');

const threatEl =
    document.getElementById('threat');


const pickupMessage =
    document.getElementById('pickupMessage');

function showPickupMessage(text,color="#ffffff"){

    pickupMessage.textContent = text;

    pickupMessage.style.color = color;

    pickupMessage.style.opacity = 1;

    clearTimeout(window.pickupTimeout);

    window.pickupTimeout = setTimeout(()=>{

        pickupMessage.style.opacity = 0;

}

//////////////////////////////////////////////////////////
// RADAR
//////////////////////////////////////////////////////////

const radar =
    document.getElementById('radar');

const radarCtx =
    radar.getContext('2d');

radar.width = 140;
radar.height = 140;

//////////////////////////////////////////////////////////
// FADE
//////////////////////////////////////////////////////////

const fade =
    document.getElementById('fade');


//////////////////////////////////////////////////////////
// PROCEDURAL LEVEL GENERATION
//////////////////////////////////////////////////////////

const levels = [];

const biomeTypes = [

    {
        name:"Forest",
        sky:0x87CEEB,
        fog:0x87CEEB,
        ground:0x55aa55,
        zombie:0x33aa33
    },

    {
        name:"Desert",
        sky:0xffc97a,
        fog:0xffb347,
        ground:0xccaa55,
        zombie:0xbb8844
    },

    {
        name:"Snow",
        sky:0xddeeff,
        fog:0xcce0ff,
        ground:0xffffff,
        zombie:0x88ccff
    },

    {
        name:"Hell",
        sky:0x441111,
        fog:0x220000,
        ground:0x551111,
        zombie:0xff2222
    },

    {
        name:"Swamp",
        sky:0x667755,
        fog:0x445533,
        ground:0x334422,
        zombie:0x99cc66
    },

    {
        name:"Night",
        sky:0x050510,
        fog:0x111122,
        ground:0x222233,
        zombie:0x77ff77
    }
];

//////////////////////////////////////////////////////////
// COOL MAP EDGE EFFECTS
//////////////////////////////////////////////////////////

const edgeEffects = [

    {
        type:"fireRing",
        damage:5,
        color:0xff5500,
        particles:true
    },

    {
        type:"electricWall",
        damage:8,
        color:0x00bbff,
        particles:true
    },

    {
        type:"lavaMoat",
        damage:10,
        color:0xff2200,
        particles:true
    },

    {
        type:"spikeFence",
        damage:4,
        color:0x999999,
        particles:false
    },

    {
        type:"darkVoid",
        damage:999,
        color:0x000000,
        particles:true
    },

    {
        type:"toxicGas",
        damage:6,
        color:0x88ff00,
        particles:true
    }
];

//////////////////////////////////////////////////////////
// GENERATE LEVELS
//////////////////////////////////////////////////////////

for(let i = 1; i <= 100; i++){

    const biome =
        biomeTypes[
            i % biomeTypes.length
        ];

    const edge =
        edgeEffects[
            i % edgeEffects.length
        ];

    //////////////////////////////////////////////////////
    // DIFFICULTY
    //////////////////////////////////////////////////////

    const difficulty = i / 100;

    const speed =
        0.03 + (difficulty * 0.22);

    const spawnRate = Math.max(
        250,
        2200 - (i * 20)
    );

    //////////////////////////////////////////////////////
    // MUCH LESS COLLECTABLES
    //////////////////////////////////////////////////////

    const collectibles = Math.max(
        1,
        Math.floor(4 - (i * 0.03))
    );

    //////////////////////////////////////////////////////
    // MAP GETS SMALLER
    //////////////////////////////////////////////////////

    const mapSize = Math.max(
        140,
        420 - (i * 2)
    );

    //////////////////////////////////////////////////////
    // FOG / DARKNESS
    //////////////////////////////////////////////////////

    const fogDensity = Math.min(
        0.14,
        0.01 + (difficulty * 0.12)
    );

    //////////////////////////////////////////////////////
    // COLOR VARIATION
    //////////////////////////////////////////////////////

    const colorShift =
        Math.floor(
            Math.random() * 0x080808
        );

    //////////////////////////////////////////////////////
    // LEVEL
    //////////////////////////////////////////////////////

    levels.push({

        level:i,

        name:
            biome.name +
            " " +
            i,

        //////////////////////////////////////////////////
        // COLORS
        //////////////////////////////////////////////////

        sky:
            biome.sky + colorShift,

        fog:
            biome.fog + colorShift,

        ground:
            biome.ground + colorShift,

        zombie:
            biome.zombie,

        //////////////////////////////////////////////////
        // ALWAYS TREES
        //////////////////////////////////////////////////

        trees:true,

        //////////////////////////////////////////////////
        // GAMEPLAY
        //////////////////////////////////////////////////

        speed:
            Number(speed.toFixed(3)),

        spawnRate,

        collectibles,

        mapSize,

        fogDensity:
            Number(
                fogDensity.toFixed(3)
            ),

        //////////////////////////////////////////////////
        // ZOMBIES
        //////////////////////////////////////////////////

        maxZombies:
            Math.floor(
                5 + (i * 2.2)
            ),

        zombieScale:
            1 + (difficulty * 0.9),

        zombieHealth:
            100 + (i * 15),

        zombieDamage:
            10 + (i * 2.5),

        //////////////////////////////////////////////////
        // WEATHER
        //////////////////////////////////////////////////

        rain:
            Math.random() > 0.8,

        lightning:
            Math.random() > 0.95,

        snow:
            biome.name === "Snow",

        //////////////////////////////////////////////////
        // COOL EDGE EFFECT
        //////////////////////////////////////////////////

        edgeEffect:edge.type,

        edgeDamage:edge.damage,

        edgeColor:edge.color,

        edgeParticles:edge.particles,

        //////////////////////////////////////////////////
        // ATMOSPHERE
        //////////////////////////////////////////////////

        ambientIntensity:
            Math.max(
                0.15,
                1 - (difficulty * 0.75)
            ),

        playerVisibility:
            Math.max(
                35,
                120 - i
            ),

        //////////////////////////////////////////////////
        // BOSS LEVELS
        //////////////////////////////////////////////////

        bossLevel:
            i % 10 === 0,

        bossHealth:
            i % 10 === 0
                ? 1500 + (i * 120)
                : 0
    });
}

//////////////////////////////////////////////////////////
// CURRENT LEVEL
//////////////////////////////////////////////////////////

let currentLevel = 0;

console.log(levels);



//////////////////////////////////////////////////////////
// LIGHTS
//////////////////////////////////////////////////////////

const hemi = new THREE.HemisphereLight(

    0xffffff,
    0x446644,
    1.3
);

scene.add(hemi);

const sun = new THREE.DirectionalLight(

    0xffffff,
    1.2
);

sun.position.set(20,30,10);

sun.castShadow = true;

scene.add(sun);

//////////////////////////////////////////////////////////
// WORLD
//////////////////////////////////////////////////////////

let ground;
const trees = [];

function buildWorld(){

    trees.forEach(t=>scene.remove(t));

    trees.length = 0;

    const level = levels[currentLevel];

    scene.background =
        new THREE.Color(level.sky);

    scene.fog =
        new THREE.Fog(level.fog,20,85);

    if(ground){

        scene.remove(ground);
    }

    ground = new THREE.Mesh(

        new THREE.PlaneGeometry(400,400),

        new THREE.MeshLambertMaterial({
            color:level.ground
        })
    );

    ground.rotation.x = -Math.PI/2;

    ground.receiveShadow = true;

    scene.add(ground);

    if(level.trees){

        for(let i=0;i<80;i++){

            const tree = new THREE.Group();

            const trunk = new THREE.Mesh(

                new THREE.BoxGeometry(1,4,1),

                new THREE.MeshLambertMaterial({
                    color:0x8b5a2b
                })
            );

            trunk.position.y = 2;

            const leaves = new THREE.Mesh(

                new THREE.BoxGeometry(4,4,4),

                new THREE.MeshLambertMaterial({
                    color:
                        currentLevel === 3
                        ? 0xddffff
                        : 0x228822
                })
            );

            leaves.position.y = 5;

            tree.add(trunk);
            tree.add(leaves);

            tree.position.set(

                (Math.random()-0.5)*300,
                0,
                (Math.random()-0.5)*300
            );

            scene.add(tree);

            trees.push(tree);
        }
    }
}

buildWorld();

//////////////////////////////////////////////////////////
// GUN
//////////////////////////////////////////////////////////

const gun = new THREE.Group();

const gunBody = new THREE.Mesh(

    new THREE.BoxGeometry(0.5,0.3,1),

    new THREE.MeshLambertMaterial({
        color:0x00aaff
    })
);

gunBody.position.set(0.4,-0.4,-1);

const barrel = new THREE.Mesh(

    new THREE.BoxGeometry(0.15,0.15,0.8),

    new THREE.MeshLambertMaterial({
        color:0x333333
    })
);

barrel.position.set(0.4,-0.35,-1.7);

gun.add(gunBody);
gun.add(barrel);

camera.add(gun);

scene.add(camera);

//////////////////////////////////////////////////////////
// AUDIO
//////////////////////////////////////////////////////////

const audioContext = new (
    window.AudioContext ||
    window.webkitAudioContext
)();

function playShootSound(){

    const osc =
        audioContext.createOscillator();

    const gain =
        audioContext.createGain();

    osc.connect(gain);

    gain.connect(audioContext.destination);

    osc.type = "square";

    osc.frequency.value = 220;

    gain.gain.value = 0.05;

    osc.start();

    osc.frequency.exponentialRampToValueAtTime(

        60,
        audioContext.currentTime + 0.08
    );

    gain.gain.exponentialRampToValueAtTime(

        0.0001,
        audioContext.currentTime + 0.08
    );

    osc.stop(
        audioContext.currentTime + 0.08
    );
}


function playTone(freq=440,duration=0.08,type="square",volume=0.04){

    const osc =
        audioContext.createOscillator();

    const gain =
        audioContext.createGain();

    osc.connect(gain);

    gain.connect(audioContext.destination);

    osc.type = type;

    osc.frequency.value = freq;

    gain.gain.value = volume;

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioContext.currentTime + duration
    );

    osc.stop(
        audioContext.currentTime + duration
    );
}

//////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////

let score = 0;
let health = 100;

let ammo = 30;

let reloading = false;

let timeLeft = 60;

let gameOver = false;
let paused = false;
let teleporting = false;

//////////////////////////////////////////////////////////
// CONTROLS
//////////////////////////////////////////////////////////

const keys = {};

let yaw = 0;
let pitch = 0;

const isMobile =
    /Android|iPhone|iPad|iPod/i
    .test(navigator.userAgent);

//////////////////////////////////////////////////////////
// PREVENT MOBILE SCROLL / DRAG / SELECTION
//////////////////////////////////////////////////////////

document.addEventListener(
    'gesturestart',
    e => e.preventDefault()
);

document.addEventListener(
    'touchmove',
    e => e.preventDefault(),
    { passive:false }
);

document.addEventListener(
    'dblclick',
    e => e.preventDefault()
);

window.addEventListener('keydown', e=>{

    const k = e.key.toLowerCase();

    keys[k] = true;

    if(k === 'p'){

        paused = !paused;

        showPickupMessage(
            paused ? "GAME PAUSED" : "GAME RESUMED",
            paused ? "#ffff44" : "#44ff44"
        );
    }

    if(k === 'r'){

        reload();
    }
});

window.addEventListener('keyup', e=>{

    keys[e.key.toLowerCase()] = false;
});

//////////////////////////////////////////////////////////
// DESKTOP
//////////////////////////////////////////////////////////

if(!isMobile){

    document.body.addEventListener(

        'click',

        ()=>{

            document.body.requestPointerLock();
        }
    );

    document.addEventListener(

        'mousemove',

        e=>{

            if(
                document.pointerLockElement
                === document.body
            ){

                yaw -= e.movementX * 0.0025;

                pitch -= e.movementY * 0.0025;

                pitch = Math.max(
                    -1.4,
                    Math.min(1.4,pitch)
                );
            }
        }
    );

    window.addEventListener(
        'mousedown',
        shoot
    );
}

//////////////////////////////////////////////////////////
// MOBILE
//////////////////////////////////////////////////////////

let lastTouchX = 0;
let lastTouchY = 0;

if(isMobile){

    window.addEventListener(

        'touchstart',

        e=>{

            const touch = e.touches[0];

            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;

            shoot();

        },

        { passive:false }
    );

    window.addEventListener(

        'touchmove',

        e=>{

            const touch = e.touches[0];

            const dx =
                touch.clientX - lastTouchX;

            const dy =
                touch.clientY - lastTouchY;

            yaw -= dx * 0.005;
            pitch -= dy * 0.005;

            pitch = Math.max(
                -1.4,
                Math.min(1.4,pitch)
            );

            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;

        },

        { passive:false }
    );
}

//////////////////////////////////////////////////////////
// GAMEPAD
//////////////////////////////////////////////////////////

let gamepadShootCooldown = 0;

function handleGamepad(delta){

    const gamepads =
        navigator.getGamepads();

    if(!gamepads) return;

    const gp = gamepads[0];

    if(!gp) return;

    const moveX = gp.axes[0];
    const moveY = gp.axes[1];

    const lookX = gp.axes[2];
    const lookY = gp.axes[3];

    yaw -= lookX * 0.06;
    pitch -= lookY * 0.06;

    pitch = Math.max(
        -1.4,
        Math.min(1.4,pitch)
    );

    const speed = 30 * delta;

    const forward = new THREE.Vector3();

    camera.getWorldDirection(forward);

    forward.y = 0;

    forward.normalize();

    const right = new THREE.Vector3();

    right.crossVectors(
        forward,
        new THREE.Vector3(0,1,0)
    );

    camera.position.add(
        forward.clone()
        .multiplyScalar(-moveY * speed)
    );

    camera.position.add(
        right.clone()
        .multiplyScalar(moveX * speed)
    );

if(
    gameOver &&
    gp.buttons[0].pressed &&
    !gp.buttons[1].pressed
){

    document
        .getElementById('newGameBtn')
        .click();
}

    gamepadShootCooldown -= delta;

    if(
        gp.buttons[7].pressed &&
        gamepadShootCooldown <= 0
    ){

        shoot();

        gamepadShootCooldown = 0.15;
    }

    if(gp.buttons[2].pressed){

        reload();
    }
}

//////////////////////////////////////////////////////////
// BULLETS
//////////////////////////////////////////////////////////

const bullets = [];

function shoot(){

    if(gameOver) return;

    if(ammo <= 0 || reloading) return;

    ammo--;

    ammoEl.textContent = ammo;

    playShootSound();

    playTone(500,0.03,"square",0.02);

    for(let i=0;i<6;i++){

        const bullet = new THREE.Mesh(

            new THREE.BoxGeometry(
                0.12,
                0.12,
                0.12
            ),

            new THREE.MeshBasicMaterial({
                color:0x66ccff
            })
        );

        const dir =
            new THREE.Vector3(0,0,-1);

        dir.applyQuaternion(
            camera.quaternion
        );

        dir.x += (Math.random()-0.5)*0.03;
        dir.y += (Math.random()-0.5)*0.03;

        bullet.position.copy(
            camera.position
        );

        bullet.userData.velocity =
            dir.multiplyScalar(1.5);

        scene.add(bullet);

        bullets.push(bullet);
    }

    gun.position.z = 0.2;

    setTimeout(()=>{

        gun.position.z = 0;

    },60);
}

//////////////////////////////////////////////////////////
// RELOAD
//////////////////////////////////////////////////////////

function reload(){
    // disabled
}

//////////////////////////////////////////////////////////
// ZOMBIES
//////////////////////////////////////////////////////////

const zombies = [];

function createZombie(){

    const level = levels[currentLevel];

    const zombie = new THREE.Group();

    const body = new THREE.Mesh(

        new THREE.BoxGeometry(
            1.2,
            2,
            1
        ),

        new THREE.MeshLambertMaterial({
            color:level.zombie
        })
    );

    body.position.y = 1;

    const head = new THREE.Mesh(

        new THREE.BoxGeometry(
            0.9,
            0.9,
            0.9
        ),

        new THREE.MeshLambertMaterial({
            color:0xaaffaa
        })
    );

    head.position.y = 2.5;

    const leg1 = new THREE.Mesh(

        new THREE.BoxGeometry(
            0.35,
            1,
            0.35
        ),

        new THREE.MeshLambertMaterial({
            color:0x222222
        })
    );

    leg1.position.set(-0.25,0.5,0);

    const leg2 = leg1.clone();

    leg2.position.x = 0.25;

    zombie.add(body);
    zombie.add(head);
    zombie.add(leg1);
    zombie.add(leg2);

    const angle =
        Math.random() * Math.PI * 2;

    const distance =
        120 + Math.random() * 50;

    zombie.position.set(

        Math.cos(angle) * distance,
        0,
        Math.sin(angle) * distance
    );

    zombie.lookAt(
        camera.position.x,
        0,
        camera.position.z
    );

    zombie.userData.speed =
        level.speed +
        Math.random() * 0.015;

    zombie.userData.legs =
        [leg1, leg2];

    zombie.userData.head = head;
    zombie.userData.hp = 100;

    scene.add(zombie);

    zombies.push(zombie);
}

//////////////////////////////////////////////////////////
// COLLECTIBLES
//////////////////////////////////////////////////////////

const collectibles = [];

function spawnCollectible(type){

    const colors = {

        health:0xff4444,
        ammo:0x44ccff,
        time:0xffff44,
        splash:0x44ff44
    };

    const item = new THREE.Mesh(

        new THREE.BoxGeometry(2,2,2),

        new THREE.MeshStandardMaterial({

            color:colors[type],

            emissive:colors[type],

            emissiveIntensity:0.5
        })
    );

    item.position.set(

        (Math.random()-0.5)*250,
        1,
        (Math.random()-0.5)*250
    );

    item.userData.type = type;

    scene.add(item);

    collectibles.push(item);
}

setInterval(()=>{

    const types = [
        'health',
        'ammo',
        'time',
        'splash'
    ];

    let random = Math.random();

    let type;

    if(random < 0.06){

        type = 'splash';
    }

    else{

        const normalTypes = [
            'health',
            'ammo',
            'time'
        ];

        type =
            normalTypes[
                Math.floor(
                    Math.random()*normalTypes.length
                )
            ];
    }

    spawnCollectible(type);

},3000);

//////////////////////////////////////////////////////////
// SPAWNER
//////////////////////////////////////////////////////////

let spawnInterval;

function startSpawner(){

    clearInterval(spawnInterval);

    spawnInterval = setInterval(()=>{

        if(gameOver) return;

        for(let i=0;i<2;i++){

            createZombie();
        }

    },levels[currentLevel].spawnRate);
}

startSpawner();

//////////////////////////////////////////////////////////
// LEVELS
//////////////////////////////////////////////////////////

function nextLevel(){

    gameOver = true;

    fade.style.opacity = 1;

    setTimeout(()=>{

        currentLevel++;

        if(currentLevel >= levels.length){

            currentLevel = 0;
        }

        levelEl.textContent =
            currentLevel + 1;

        playTone(520,0.12,"triangle",0.06);

        setTimeout(()=>{

            playTone(780,0.18,"triangle",0.05);

        },120);

        showPickupMessage(
            "LEVEL " + (currentLevel + 1),
            "#ffffff"
        );

        buildWorld();

        zombies.forEach(z=>scene.remove(z));

        zombies.length = 0;

        timeLeft = 60;

        startSpawner();

        fade.style.opacity = 0;

        gameOver = false;

    },1000);
}

//////////////////////////////////////////////////////////
// TIMER
//////////////////////////////////////////////////////////

setInterval(()=>{

    if(gameOver) return;

    timeLeft--;

    timeEl.textContent = timeLeft;

    if(timeLeft <= 0){

        nextLevel();
    }

},1000);

//////////////////////////////////////////////////////////
// GAME OVER
//////////////////////////////////////////////////////////

const message =
    document.getElementById('message');

const messageTitle =
    document.getElementById('messageTitle');

const messageText =
    document.getElementById('messageText');

function endGame(title,text){

    if(gameOver) return;

    gameOver = true;

    playTone(220,0.3,"sawtooth",0.08);

    setTimeout(()=>{

        playTone(110,0.5,"sawtooth",0.07);

    },180);

    message.style.display = 'block';

    messageTitle.innerHTML = title;

    messageText.innerHTML = text;
}

//////////////////////////////////////////////////////////
// NEW GAME
//////////////////////////////////////////////////////////

document
.getElementById('newGameBtn')

.addEventListener('click', ()=>{

    zombies.forEach(z=>scene.remove(z));

    bullets.forEach(b=>scene.remove(b));

    collectibles.forEach(c=>scene.remove(c));

    zombies.length = 0;
    bullets.length = 0;
    collectibles.length = 0;

    score = 0;
    health = 100;

    ammo = 30;

    timeLeft = 60;

    currentLevel = 0;

    gameOver = false;

    camera.position.set(0,2,5);

    scoreEl.textContent = score;

    healthEl.textContent = health;

    ammoEl.textContent = ammo;

    timeEl.textContent = timeLeft;

    levelEl.textContent = 1;

    buildWorld();

    startSpawner();

    message.style.display = 'none';
});

//////////////////////////////////////////////////////////
// ANIMATION
//////////////////////////////////////////////////////////


//////////////////////////////////////////////////////////
// SKY DIP EFFECT
//////////////////////////////////////////////////////////

let skyDipAmount = 0;

function triggerSkyDip(){

    skyDipAmount = 1;

    fade.style.transition = "opacity 3s";

    fade.style.opacity = 0.12;

    setTimeout(()=>{

        fade.style.opacity = 0;

    },3000);
}

const clock = new THREE.Clock();

function animate(){

    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if(paused || teleporting){
        renderer.render(scene,camera);
        return;
    }

    camera.rotation.order = 'YXZ';

    camera.rotation.y = yaw;

    camera.rotation.x = pitch;

    //////////////////////////////////////////////////////
    // MOVEMENT
    //////////////////////////////////////////////////////

    const speed = 20 * delta;

    const forward = new THREE.Vector3();

    camera.getWorldDirection(forward);

    forward.y = 0;

    forward.normalize();

    const right = new THREE.Vector3();

    right.crossVectors(
        forward,
        new THREE.Vector3(0,1,0)
    );

if(keys['w'] || keys['arrowup']){
    camera.position.add(
        forward.clone().multiplyScalar(speed)
    );
}

if(keys['s'] || keys['arrowdown']){
    camera.position.add(
        forward.clone().multiplyScalar(-speed)
    );
}

if(keys['a'] || keys['arrowleft']){
    camera.position.add(
        right.clone().multiplyScalar(speed)
    );
}

if(keys['d'] || keys['arrowright']){
    camera.position.add(
        right.clone().multiplyScalar(-speed)
    );
}

    if(isMobile){

        camera.position.add(
            forward.clone()
            .multiplyScalar(speed*1.4)
        );
    }

    //////////////////////////////////////////////////////
    // GAMEPAD
    //////////////////////////////////////////////////////

    handleGamepad(delta);

    //////////////////////////////////////////////////////
    // MAP WRAP + DAMAGE
    //////////////////////////////////////////////////////

    if(!teleporting && (
        camera.position.x > MAP_SIZE ||
        camera.position.x < -MAP_SIZE ||
        camera.position.z > MAP_SIZE ||
        camera.position.z < -MAP_SIZE
    )){

        teleporting = true;

        const targetX =
            camera.position.x > MAP_SIZE ? -MAP_SIZE :
            camera.position.x < -MAP_SIZE ? MAP_SIZE :
            camera.position.x;

        const targetZ =
            camera.position.z > MAP_SIZE ? -MAP_SIZE :
            camera.position.z < -MAP_SIZE ? MAP_SIZE :
            camera.position.z;

        fade.style.background = "#fff";
        fade.style.opacity = 1;

        setTimeout(()=>{

            camera.position.x = targetX;
            camera.position.z = targetZ;

            health = Math.max(0, health - 25);
            healthEl.textContent = health;

            showPickupMessage("-25 HEALTH", "#ff2222");

            if(health <= 0){
                endGame(
                    "GAME OVER",
                    "You reached Level " + (currentLevel + 1)
                );
            }

            fade.style.opacity = 0;

            setTimeout(()=>{
                fade.style.background = "black";
                teleporting = false;
            },1000);

        },1000);
    }

//////////////////////////////////////////////////////
    // GUN BOB
    //////////////////////////////////////////////////////

    gun.rotation.z =
        Math.sin(
            performance.now()*0.005
        ) * 0.02;

    gun.position.y =
        Math.sin(
            performance.now()*0.007
        ) * 0.02;

    //////////////////////////////////////////////////////
    // BULLETS
    //////////////////////////////////////////////////////

    for(let i=bullets.length-1;i>=0;i--){

        const bullet = bullets[i];

        bullet.position.add(
            bullet.userData.velocity
        );

        if(
            bullet.position.distanceTo(
                camera.position
            ) > 100
        ){

            scene.remove(bullet);

            bullets.splice(i,1);

            continue;
        }

        for(let z=zombies.length-1;z>=0;z--){

            const zombie = zombies[z];

            const headWorldPos = new THREE.Vector3();
            zombie.userData.head.getWorldPosition(headWorldPos);

            const headshot =
                bullet.position.distanceTo(headWorldPos) < 0.7;

            const bodyshot =
                bullet.position.distanceTo(zombie.position) < 1.4;

            if(headshot){

                zombie.userData.hp -= 100;

                scene.remove(bullet);
                bullets.splice(i,1);

                score += 50;
                scoreEl.textContent = score;

                showPickupMessage(
                    "HEADSHOT +50",
                    "#ffcc00"
                );

                playTone(1200,0.08,"square",0.04);

                if(zombie.userData.hp <= 0){

                    scene.remove(zombie);
                    zombies.splice(z,1);
                }

                break;
            }

            else if(bodyshot){

                zombie.userData.hp -= 40;

                scene.remove(bullet);
                bullets.splice(i,1);

                score += 10;
                scoreEl.textContent = score;

                showPickupMessage(
                    "HIT +10",
                    "#ffffff"
                );

                playTone(880,0.06,"square",0.03);

                if(zombie.userData.hp <= 0){

                    scene.remove(zombie);
                    zombies.splice(z,1);
                }

                break;
            }
        }
    }

    //////////////////////////////////////////////////////
    // ZOMBIES
    //////////////////////////////////////////////////////

    for(let i=zombies.length-1;i>=0;i--){

        const zombie = zombies[i];

        const dir = new THREE.Vector3()

            .subVectors(
                camera.position,
                zombie.position
            )

            .normalize();

        zombie.position.add(
            dir.multiplyScalar(
                zombie.userData.speed
            )
        );

        zombie.position.y = 0;

        zombie.lookAt(
            camera.position.x,
            zombie.position.y,
            camera.position.z
        );

        const walk =
            performance.now() * 0.008;

        zombie.userData.legs[0].rotation.x =
            Math.sin(walk) * 0.6;

        zombie.userData.legs[1].rotation.x =
            -Math.sin(walk) * 0.6;

        if(
            zombie.position.distanceTo(
                camera.position
            ) < 2.2
        ){

            health -= 15;

            health =
                Math.max(0,health);

            healthEl.textContent =
                health;

            playTone(120,0.2,"sawtooth",0.06);

            showPickupMessage(
                "-15 HEALTH",
                "#ff2222"
            );

            fade.style.opacity = 0.35;

            setTimeout(()=>{

                fade.style.opacity = 0;

            },120);

            scene.remove(zombie);

            zombies.splice(i,1);

            if(health <= 0){

                endGame(
                    "GAME OVER",
                    "You reached Level " +
                    (currentLevel + 1)
                );
            }
        }
    }

//////////////////////////////////////////////////////
// COLLECTIBLES
//////////////////////////////////////////////////////

for(let i = collectibles.length - 1; i >= 0; i--){

    const item = collectibles[i];

    //////////////////////////////////////////////////
    // SKIP REMOVED
    //////////////////////////////////////////////////

    if(!item.parent) continue;

    //////////////////////////////////////////////////
    // ANIMATION
    //////////////////////////////////////////////////

    item.rotation.y += 0.03;

    item.position.y =
        1 +
        Math.sin(
            performance.now() * 0.003 + i
        ) * 0.25;

    //////////////////////////////////////////////////
    // DISTANCE
    //////////////////////////////////////////////////

    const dx =
        camera.position.x - item.position.x;

    const dz =
        camera.position.z - item.position.z;

    const dist =
        Math.sqrt(dx * dx + dz * dz);

    //////////////////////////////////////////////////
    // MAGNET
    //////////////////////////////////////////////////

    if(dist < 14){

        item.position.x += dx * 0.08;
        item.position.z += dz * 0.08;
    }

    //////////////////////////////////////////////////
    // PICKUP
    //////////////////////////////////////////////////

    if(dist < 3.5){

        //////////////////////////////////////////////////
        // REMOVE FIRST
        //////////////////////////////////////////////////

        scene.remove(item);
        collectibles.splice(i,1);

        //////////////////////////////////////////////////
        // HEALTH
        //////////////////////////////////////////////////

        if(item.userData.type === 'health'){

            health = Math.min(100, health + 25);

            healthEl.textContent = health;

            showPickupMessage("+25 HEALTH","#ff4444");

            playTone(320,0.18,"sine",0.05);
        }

        //////////////////////////////////////////////////
        // AMMO
        //////////////////////////////////////////////////

        else if(item.userData.type === 'ammo'){

            ammo += 50;

            ammoEl.textContent = ammo;

            showPickupMessage("+50 AMMO","#44ccff");

            playTone(700,0.12,"square",0.05);
        }

        //////////////////////////////////////////////////
        // TIME
        //////////////////////////////////////////////////

        else if(item.userData.type === 'time'){

            score += 50;

            scoreEl.textContent = score;

            showPickupMessage("+50 SCORE","#ffff44");

            playTone(950,0.15,"triangle",0.05);
        }

        //////////////////////////////////////////////////
        // SPLASH BOMB
        //////////////////////////////////////////////////

        else if(item.userData.type === 'splash'){

            let killed = 0;

            for(let z = zombies.length - 1; z >= 0; z--){

                const zombie = zombies[z];

                const dist =
                    zombie.position.distanceTo(
                        camera.position
                    );

                if(dist < 10000000){

                    scene.remove(zombie);

                    zombies.splice(z,1);

                    killed++;

                    score += 10;
                }
            }

            scoreEl.textContent = score;

            showPickupMessage(
                "SPLASHR! +" + killed + " HITS",
                "#44ff44"
            );

            // explosion sounds
            playTone(80,0.4,"sawtooth",0.09);

            setTimeout(()=>{

                playTone(40,0.5,"sawtooth",0.07);

            },120);

            // visual flash
            fade.style.background = "#44ff44";

            fade.style.opacity = 0.45;

            setTimeout(()=>{

                fade.style.opacity = 0;

                fade.style.background = "black";

            },220);
        }
    }
}


    //////////////////////////////////////////////////////
    // RADAR
    //////////////////////////////////////////////////////


radarCtx.clearRect(0,0,140,140);

radarCtx.fillStyle = "rgba(0,0,0,0.5)";
radarCtx.fillRect(0,0,140,140);

// compass
radarCtx.fillStyle = "white";
radarCtx.font = "12px Arial";

radarCtx.fillText("N",66,12);
radarCtx.fillText("S",66,136);
radarCtx.fillText("W",8,74);
radarCtx.fillText("E",126,74);

// radar rings
radarCtx.strokeStyle = "rgba(255,255,255,0.15)";

radarCtx.beginPath();
radarCtx.arc(70,70,25,0,Math.PI*2);
radarCtx.stroke();

radarCtx.beginPath();
radarCtx.arc(70,70,50,0,Math.PI*2);
radarCtx.stroke();

// player direction arrow
radarCtx.save();

radarCtx.translate(70,70);

radarCtx.rotate(-yaw);

radarCtx.fillStyle = "white";

radarCtx.beginPath();

radarCtx.moveTo(0,-8);
radarCtx.lineTo(5,6);
radarCtx.lineTo(-5,6);

radarCtx.closePath();

radarCtx.fill();

radarCtx.restore();

// rotate enemy positions by camera yaw
const cos = Math.cos(-yaw);
const sin = Math.sin(-yaw);

// center cross
radarCtx.strokeStyle = "rgba(255,255,255,0.15)";

radarCtx.beginPath();
radarCtx.moveTo(70,0);
radarCtx.lineTo(70,140);
radarCtx.stroke();

radarCtx.beginPath();
radarCtx.moveTo(0,70);
radarCtx.lineTo(140,70);
radarCtx.stroke();

radarCtx.fillStyle = "red";

zombies.forEach(z => {

    let dx = z.position.x - camera.position.x;
    let dz = z.position.z - camera.position.z;

    // rotate into camera space
    const rx = dx * cos - dz * sin;
    const rz = dx * sin + dz * cos;

    const scale = 0.25;

    const x = 70 + rx * scale;
    const y = 70 - rz * scale;

    const dist =
        Math.sqrt(dx*dx + dz*dz);

    const size =
        Math.max(2, 7 - dist * 0.04);

    // clamp enemies to radar border
    const clampedX =
        Math.max(4, Math.min(136, x));

    const clampedY =
        Math.max(4, Math.min(136, y));

    radarCtx.fillRect(
        clampedX,
        clampedY,
        size,
        size
    );

});


    //////////////////////////////////////////////////////
    // THREAT LEVEL
    //////////////////////////////////////////////////////

    const zombieCount = zombies.length;

    if(zombieCount < 10){

        threatEl.textContent = "LOW";
        threatEl.style.color = "#66ff66";
    }

    else if(zombieCount < 25){

        threatEl.textContent = "MEDIUM";
        threatEl.style.color = "#ffff44";
    }

    else if(zombieCount < 40){

        threatEl.textContent = "HIGH";
        threatEl.style.color = "#ff8844";
    }

    else{

        threatEl.textContent = "EXTREME";
        threatEl.style.color = "#ff2222";
    }

//////////////////////////////////////////////////////
    // OVERRUN
    //////////////////////////////////////////////////////

    if(zombies.length > 60){

        endGame(
            "THREAT LEVEL CRITICAL",
            "THE HORDE CONSUMED YOU"
        );
    }

    //////////////////////////////////////////////////////
    // RENDER
    //////////////////////////////////////////////////////

    
//////////////////////////////////////////////////////
    // SKY + GROUND COLOR SHIFT
    //////////////////////////////////////////////////////

    if(skyDipAmount > 0){

        skyDipAmount *= 0.988;

        const level = levels[currentLevel];

        //////////////////////////////////////////////////
        // SKY
        //////////////////////////////////////////////////

        const targetSky =
            new THREE.Color(level.sky);

        scene.background.lerp(
            targetSky,
            0.06
        );

        //////////////////////////////////////////////////
        // GROUND
        //////////////////////////////////////////////////

        if(ground){

            const targetGround =
                new THREE.Color(level.ground);

            ground.material.color.lerp(
                targetGround,
                0.06
            );
        }
    }

    else{

        scene.background =
            new THREE.Color(
                levels[currentLevel].sky
            );

        if(ground){

            ground.material.color.set(
                levels[currentLevel].ground
            );
        }
    }

renderer.render(scene,camera);
}

animate();

<script>
document.addEventListener("DOMContentLoaded", () => {

  // --- Create Speaker Button ---
  const speakerBtn = document.createElement("button");
  speakerBtn.id = "speakerToggle";

  Object.assign(speakerBtn.style, {
    position: "fixed",
    left: "12px",
    bottom: "12px",
    width: "44px",
    height: "44px",
    borderRadius: "50%",
    border: "none",
    background: "rgba(0,0,0,0.5)",
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    cursor: "pointer",
    zIndex: 1000,
    padding: "0"
  });

  speakerBtn.title = "Toggle Music";

  // --- SVG Icons ---
  const volumeOffSVG = `
    <svg xmlns="http://www.w3.org/2000/svg"
      width="28"
      height="28"
      viewBox="0 0 24 24"
      fill="white">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.91 8.91 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM3.27 2 2 3.27 6.73 8H3v8h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.93 8.93 0 0 0 3.75-1.81L20.73 22 22 20.73 12 10.73 3.27 2zM12 3.27 9.91 5.36 12 7.45V3.27z"/>
    </svg>
  `;

  const volumeOnSVG = `
    <svg xmlns="http://www.w3.org/2000/svg"
      width="28"
      height="28"
      viewBox="0 0 24 24"
      fill="white">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05A4.97 4.97 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  `;

  speakerBtn.innerHTML = volumeOffSVG;

  document.body.appendChild(speakerBtn);

  // --- Audio Player ---
  const audioPlayer = document.createElement("audio");
  audioPlayer.id = "backgroundAudio";
  audioPlayer.style.display = "none";
  document.body.appendChild(audioPlayer);

  const playlist = [
    { title: "Sundance", artist: "Tisch", src: "./assets/music/01.mp3" },
    { title: "8 Bit Super Party", artist: "Tisch", src: "./assets/music/02.mp3" },
    { title: "Flashback", artist: "Tisch", src: "./assets/music/03.mp3" },
    { title: "Dancing Lights", artist: "Tisch", src: "./assets/music/04.mp3" },
    { title: "Teddy Bear in Trance", artist: "Tisch", src: "./assets/music/05.mp3" },
    { title: "Stranger", artist: "Tisch", src: "./assets/music/06.mp3" },
    { title: "Time", artist: "Tisch", src: "./assets/music/07.mp3" },
    { title: "Mystic Monsters", artist: "Tisch", src: "./assets/music/08.mp3" },
    { title: "Hyper Horses", artist: "Tisch", src: "./assets/music/09.mp3" },
    { title: "Escape", artist: "Tisch", src: "./assets/music/10.mp3" },
    { title: "Invisible", artist: "Tisch", src: "./assets/music/11.mp3" }
  ];

  let currentIndex = Math.floor(Math.random() * playlist.length);

  const audioContext = new (window.AudioContext || window.webkitAudioContext)();

  const sourceNode = audioContext.createMediaElementSource(audioPlayer);
  const gainNode = audioContext.createGain();

  gainNode.gain.value = 0.2;

  sourceNode.connect(gainNode);
  gainNode.connect(audioContext.destination);

  function loadTrack(index) {
    const track = playlist[index];
    audioPlayer.src = track.src;
  }

  async function nextTrack() {
    currentIndex = (currentIndex + 1) % playlist.length;
    loadTrack(currentIndex);

    try {
      await audioPlayer.play();
    } catch (err) {
      console.error(err);
    }
  }

  audioPlayer.addEventListener("ended", nextTrack);

  // --- State ---
  let playing = false;
  let hasStartedMusic = false;

  // --- Start Music Once ---
  async function startMusicOnce() {

    if (hasStartedMusic) return;

    hasStartedMusic = true;

    if (audioContext.state === "suspended") {
      await audioContext.resume();
    }

    loadTrack(currentIndex);

    try {

      await audioPlayer.play();

      playing = true;

      speakerBtn.innerHTML = volumeOnSVG;

    } catch (err) {

      console.error("Playback failed:", err);

    }
  }

  // First click anywhere starts music once
  document.addEventListener(
    "pointerdown",
    startMusicOnce,
    { once: true }
  );

  // --- Speaker Toggle ---
  speakerBtn.addEventListener("click", async (e) => {

    e.stopPropagation();

    if (!hasStartedMusic) {
      await startMusicOnce();
      return;
    }

    if (audioContext.state === "suspended") {
      await audioContext.resume();
    }

    if (playing) {

      audioPlayer.pause();

      speakerBtn.innerHTML = volumeOffSVG;

      playing = false;

    } else {

      try {

        await audioPlayer.play();

        speakerBtn.innerHTML = volumeOnSVG;

        playing = true;

        speakerBtn.animate(
          [
            { transform: "rotate(0deg)" },
            { transform: "rotate(15deg)" },
            { transform: "rotate(-15deg)" },
            { transform: "rotate(0deg)" }
          ],
          {
            duration: 300,
            iterations: 1
          }
        );

      } catch (err) {

        console.error(err);

      }
    }
  });

});
</script>

  topLink.style.top = "12px";
  topLink.style.left = "50%";
  topLink.style.transform = "translateX(-50%)";
  topLink.style.zIndex = 1000;
  topLink.style.display = "inline-block";

  const img = document.createElement("img");
  img.src = "./assets/logo.png";
  img.alt = "Logo";
  img.style.width = "140px";
  img.style.height = "auto";
  img.style.cursor = "pointer";

  topLink.appendChild(img);
  document.body.appendChild(topLink);
});
</script>

<script>
  // Detect touch device
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  // Only run on desktop
  if (!isTouchDevice) {

    // Create overlay
    const overlay = document.createElement('div');

    Object.assign(overlay.style, {
      position: 'fixed',
      top: '50%',
      left: '50%',
      transform: 'translate(-50%, -50%)',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      zIndex: '999',
      opacity: '1',
      transition: 'opacity 1s ease',
      cursor: 'pointer'
    });

    // Create single image
    const img = document.createElement('img');
    img.src = './assets/pc.png';
    img.style.maxWidth = '250px';

    // Append image
    overlay.appendChild(img);

    // Add to DOM
    document.body.appendChild(overlay);

    // Fade out
    function fadeOut() {
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 1000);
    }

    // Click to hide
    overlay.addEventListener('click', fadeOut);

    // Auto hide after 3 seconds
    setTimeout(fadeOut, 3000);
  }
</script>

<div id="pickupMessage"></div>

</body>
</html>
