<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Masonic Chess vs AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
:root{
    --black:#111;
    --white:#f5f5f5;
    --red:#c62828;
    --blue:#1565c0;
    --gold:#d4af37;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    color:#eee;
    font-family:Arial,serif;
}

h1{
    margin:20px 0 10px;
    letter-spacing:3px;
    color:var(--gold);
}

.topbar{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.btn,
select{
    background:linear-gradient(#222,#111);
    color:var(--gold);
    border:1px solid var(--gold);
    border-radius:12px;
    padding:10px 16px;
    font-size:15px;
    box-shadow:0 0 10px rgba(212,175,55,.25);
}

.btn{
    height:44px;
}

.btn:hover{
    cursor:pointer;
    transform:translateY(-1px);
}

#difficulty{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;

    background:linear-gradient(#222,#111);
    color:var(--gold);
    border:1px solid var(--gold);
    border-radius:12px;
    padding:10px 16px;
    font-size:15px;
    box-shadow:0 0 10px rgba(212,175,55,.25);
    height:44px;
}

#difficulty:focus{
    outline:none;
}

.layout{
    display:flex;
    gap:24px;
    align-items:flex-start;
    justify-content:center;
    width:100%;
    max-width:1200px;
}

#boardWrap{
    position:relative;
}

#board{
    width:min(80vmin,640px);
    margin:auto;
    display:grid;
    grid-template-columns:repeat(8,1fr);
    aspect-ratio:1;
    box-shadow:0 0 100px rgba(212,175,55,.25);
}

.sq{
    position:relative;
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    cursor:pointer;
}

.light{
    background:#f0f0f0;
}

.dark{
    background:#111;
}

.coord{
    position:absolute;
    font-size:10px;
    color:var(--gold);
    opacity:.8;
}

.rank{
    top:2px;
    left:4px;
}

.file{
    bottom:2px;
    right:4px;
}

.dot{
    width:14px;
    height:14px;
    position:absolute;
    border-radius:50%;
    background:rgba(212,175,55,.8);
}

.red{
    color:#b71c1c;
    font-weight:700;
}

.blue{
    color:#0d47a1;
    font-weight:700;
}

.panel{
    width:300px;
    padding:16px;
    background:#161616;
    border:1px solid #333;
    border-radius:12px;
}

#history{
    font-family:Arial,serif;
    white-space:pre-wrap;
    max-height:250px;
    overflow:auto;
}

#status{
    color:var(--gold);
    font-weight:bold;
    margin-bottom:10px;
}

@media(max-width:900px){

    .layout{
        flex-direction:column;
        align-items:center;
    }

    .panel{
        width:min(90vw,500px);
    }

}
</style>
</head>
<body>

<h1>✦ MASONIC CHESS ✦</h1>

<div class="topbar">
<button class="btn" onclick="newGame()">New Game</button>

<select id="difficulty">
<option value="500">Entered Apprentice</option>
<option value="1200" selected>Fellow Craft</option>
<option value="2500">Master Mason</option>
</select>
</div>

<div class="layout">
<div id="boardWrap">
<div id="board"></div>
</div>

<div class="panel">
<div id="status">Your move</div>

<h3>Material Score</h3>
<div id="score"></div>

<h3>Move Protocol</h3>
<div id="history"></div>
</div>
</div>

<script>
const chess=new Chess();

const blob=new Blob([`
self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
`],{type:'application/javascript'});

const engine=new Worker(URL.createObjectURL(blob));

const P={
p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",
P:"♟",R:"♜",N:"♞",B:"♝",Q:"♛",K:"♚"
};

let selected=null;
let legal=[];

const moveSound=new Audio('data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTAAAAAA////AAAA////AAAA');
function playMove(){ try{moveSound.currentTime=0;moveSound.play();}catch(e){} }


function draw(){

const board=document.getElementById("board");
board.innerHTML="";

const pos=chess.board();

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

const sq=document.createElement("div");
sq.className="sq "+(((r+c)%2)?"dark":"light");

const name="abcdefgh"[c]+(8-r);

const piece=pos[r][c];

if(piece){
sq.textContent=P[piece.color==="w"?piece.type.toUpperCase():piece.type];
sq.classList.add(piece.color==="w"?"blue":"red");
}

if(legal.includes(name)){
const d=document.createElement("div");
d.className="dot";
sq.appendChild(d);
}

if(c===0){
const rank=document.createElement("div");
rank.className="coord rank";
rank.textContent=8-r;
sq.appendChild(rank);
}

if(r===7){
const file=document.createElement("div");
file.className="coord file";
file.textContent="abcdefgh"[c].toUpperCase();
sq.appendChild(file);
}

sq.onclick=()=>clickSquare(name);

board.appendChild(sq);
}
}

updateHistory();
updateScore();

let st="Your move";

if(chess.in_check()) st="CHECK!";
if(chess.in_checkmate()) st="CHECKMATE!";

if(chess.turn()==="b" && !chess.in_checkmate())
st="AI thinking...";

document.getElementById("status").textContent=st;
}

function clickSquare(square){

if(chess.turn()!=="w") return;

if(!selected){

const p=chess.get(square);

if(p && p.color==="w"){
selected=square;
legal=chess.moves({square:square,verbose:true}).map(m=>m.to);
}

draw();
return;
}

const move=chess.move({
from:selected,
to:square,
promotion:"q"
});

selected=null;
legal=[];

if(move){
playMove();
draw();
setTimeout(aiMove,100);
}else{
draw();
}
}

function aiMove(){

engine.onmessage=function(e){

const txt=String(e.data);

if(txt.startsWith("bestmove")){

const m=txt.split(" ")[1];

if(m && m.length>=4){
chess.move({
from:m.slice(0,2),
to:m.slice(2,4),
promotion:"q"
});
}

playMove();
draw();
}
};

engine.postMessage("position fen "+chess.fen());
engine.postMessage("go movetime "+document.getElementById("difficulty").value);
}

function updateHistory(){

const h=chess.history();

let txt="";

for(let i=0;i<h.length;i+=2){
txt+=(i/2+1)+". "+h[i];
if(h[i+1]) txt+=" "+h[i+1];
txt+="\n";
}

document.getElementById("history").textContent=txt;
}

function updateScore(){

const values={p:1,n:3,b:3,r:5,q:9};
let white=0,black=0;

chess.board().flat().forEach(p=>{
if(!p) return;
const v=values[p.type]||0;
if(p.color==="w") white+=v;
else black+=v;
});

document.getElementById("score").innerHTML=
"<b>White (Blue):</b> "+white+
"<br><b>Black (Red):</b> "+black+
"<br><br><b>Difference:</b> "+(white-black);
}

function newGame(){
chess.reset();
selected=null;
legal=[];
draw();
}

draw();
</script>
</body>
</html>
