 });
 ui.innerHTML=`Score ${score}<br>Combo x${combo}<br>${timeMode.checked?"Time "+timeLeft.toFixed(1):"Endless"}<br>Cyan=Good Red=Avoid Green=+10s`;

<script>
// ==========================================
// SONIC PLASMA RING WEAPON
// ==========================================

const bullets = [];

const maxBullets = 150;
let bulletsLeft = maxBullets;

let lastShot = 0;
const fireRate = 120;

function shoot(){

    if(bulletsLeft<=0) return;

    const now = performance.now();

    if(now-lastShot<fireRate) return;

    lastShot = now;
    bulletsLeft--;

    const ring = new THREE.Mesh(

        new THREE.TorusGeometry(
            0.45,
            0.10,
            16,
            48
        ),

        new THREE.MeshBasicMaterial({
            color:0xffff33,
            transparent:true,
            opacity:1
        })

    );

    // Vertical like gameplay rings
    ring.rotation.set(0,0,0);

    ring.position.copy(ship.position);
    ring.position.z -= 3;

    ring.userData = {
        speed:40,
        age:0
    };

    scene.add(ring);
    Sound.shot();
    camera.position.z+=0.25;

    const flash=new THREE.PointLight(0xffff99,10,18);
    flash.position.copy(ship.position);
    scene.add(flash);
    setTimeout(()=>scene.remove(flash),60);
    bullets.push(ring);

}

window.addEventListener("keydown",e=>{

    if(e.code==="Space"){

        e.preventDefault();
        shoot();

    }

});

const oldLoop = loop;

loop = function(){

    requestAnimationFrame(loop);
    if(gameOver){ renderer.render(scene,camera); return; }

    const now = performance.now();
    const dt = (now-last)/1000;
    last = now;

    if(timeMode.checked){

        timeLeft -= dt;

        if(timeLeft<=0){

            gameOver=true;document.getElementById("overlayScore").innerHTML="Final Score<br><b>"+score+"</b>";document.querySelector("#overlayBox h1").textContent="TIME UP";showGameOver();

        }

    }

    if(keys.a||keys.arrowleft)tx-=.4;
    if(keys.d||keys.arrowright)tx+=.4;
    if(keys.w||keys.arrowup)ty+=.25;
    if(keys.s||keys.arrowdown)ty-=.25;

    tx=Math.max(-25,Math.min(25,tx));
    ty=Math.max(-12,Math.min(12,ty));

    ship.position.x+=(tx-ship.position.x)*.08;
    ship.position.y+=(ty-ship.position.y)*.08;

    ship.rotation.z=-ship.position.x*.04;
    ship.rotation.x=ship.position.y*.05;

    const sp=keys.shift?8:4;

    camera.position.z-=sp;
    ship.position.z=camera.position.z-15;

    light.position.copy(camera.position);

    camera.position.x+=(ship.position.x*.35-camera.position.x)*.05;
    camera.position.y+=((ship.position.y*.2)+2-camera.position.y)*.05;

    camera.lookAt(
        ship.position.x,
        ship.position.y,
        ship.position.z-100
    );

    stars.forEach(s=>{

        s.position.z+=sp*12;

        if(s.position.z>camera.position.z){

            s.position.z=camera.position.z-5000;
            s.position.x=(Math.random()-.5)*600;
            s.position.y=(Math.random()-.5)*350;

        }

    });

    // ==========================================
    // SONIC PLASMA UPDATE
    // ==========================================

    bullets.slice().forEach((b,i)=>{

        b.position.z -= b.userData.speed;

        b.userData.age += dt;

        const scale = 1 + b.userData.age*5;

        b.scale.set(scale,scale,1);

        b.rotation.z += 0.12;

        b.material.opacity = Math.max(
            0,
            1-b.userData.age
        );

        if(
            b.position.z<camera.position.z-3000 ||
            b.material.opacity<=0
        ){

            scene.remove(b);
            bullets.splice(i,1);

        }

    });

    // ==========================================
    // RINGS
    // ==========================================

    rings.slice().forEach(g=>{

        g.rotation.z += .01;

        if(
            !g.userData.hit &&
            Math.abs(g.position.z-ship.position.z)<8
        ){

            const d = Math.hypot(
                ship.position.x-g.position.x,
                ship.position.y-g.position.y
            );

            if(d<5){

                g.userData.hit = true;

                if(g.userData.type==="good"){

                    combo++;feedback("✨ PERFECT GATE","#44ffff");
                    score += 50*combo;
                    g.children[0].material.color.setHex(0xffff55);

                }

                if(g.userData.type==="bad"){

                    combo = 0;
                    score = Math.max(0,score-200);
                    g.children[0].material.color.setHex(0xff0000);

                }

                if(g.userData.type==="time"){

                    timeLeft += 10;
                    score += 100;

                    // refill ammo with time rings
                    bulletsLeft = Math.min(
                        maxBullets,
                        bulletsLeft + 25
                    );

                    g.children[0].material.color.setHex(0xffffff);

                }

            }else if(g.userData.type==="good"){

                combo = 0;

            }

        }

        if(g.position.z>camera.position.z+20)
            recycle(g);

    });

ui.innerHTML =
`Score ${score}<br>
Combo x${combo}<br>
Shield ${shield}/100<br>
Ammo ${bulletsLeft}/${maxBullets}<br>
${timeMode.checked?"Time "+timeLeft.toFixed(1):"Endless"}<br>
Cyan=Good Red=Avoid Green=+10s`;

// THIS LINE IS MISSING
updateAsteroids();

Sound.engine(

    keys.shift ? 8 : 4

);

renderer.render(scene,camera);

}
</script>

<script>

 document.getElementById('overlayScore').innerHTML='Final Score<br><b>'+score+'</b>';
 document.getElementById('overlay').style.display='flex';
}

 const el=document.getElementById("feedback");
 if(!el) return;
 el.style.color=color;
 el.textContent=msg;
 el.style.opacity="1";
 clearTimeout(el._t);
 el._t=setTimeout(()=>el.style.opacity="0",1200);
}

function floatingMessage(msg,x,y,z,color="#ffff55"){
 const d=document.createElement('div');
 d.textContent=msg;
 d.style.cssText=`position:fixed;left:50%;top:30%;transform:translate(-50%,-50%);color:${color};font:bold 42px Arial;text-shadow:0 0 20px ${color};pointer-events:none;z-index:9999;transition:all .9s ease;`;
 document.body.appendChild(d);
 requestAnimationFrame(()=>{d.style.top='20%';d.style.opacity='0';});
 setTimeout(()=>d.remove(),900);

<script>
// ==========================================
// ASTEROID SYSTEM v4
// Real collisions + exploding asteroids
// ==========================================

let shield = 100;
let gameOver=false;

const asteroids = [];
const asteroidFragments = [];
const explosionLights=[];
const pickups=[];

// ------------------------------------------

function explodeAsteroid(pos){

    for(let i=0;i<90;i++){

        const p = new THREE.Mesh(

            new THREE.IcosahedronGeometry(.18+Math.random()*.18,0),

            new THREE.MeshBasicMaterial({
                color:Math.random()>0.5 ? 0xffaa33 : 0x777777
            })

        );

        p.position.copy(pos);

        p.userData={

            vx:(Math.random()-.5)*2,
            vy:(Math.random()-.5)*2,
            vz:-Math.random()*3-1,
            life:1.2

        };

        scene.add(p);
        asteroidFragments.push(p);

    }


    const flash=new THREE.PointLight(0xffaa33,25,60);
    flash.position.copy(pos);
    flash.userData={life:0.35};
    scene.add(flash);
    explosionLights.push(flash);

    const wave=new THREE.Mesh(
        new THREE.TorusGeometry(1,.15,12,48),
        new THREE.MeshBasicMaterial({color:0xffff66,transparent:true,opacity:1})
    );
    wave.position.copy(pos);
    wave.userData={shock:true,life:1};
    scene.add(wave);
    asteroidFragments.push(wave);
}

// ------------------------------------------

function spawnPickup(pos){

    const isShield=Math.random()<0.35;

    const p=new THREE.Mesh(
        new THREE.OctahedronGeometry(.8),
        new THREE.MeshBasicMaterial({color:isShield?0x33ccff:0xffdd33})
    );

    p.position.copy(pos);
    p.userData={
        shield:isShield,
        ammo:!isShield,
        vx:(Math.random()-.5)*0.8,
        vy:(Math.random()-.5)*0.8,
        vz:-(1+Math.random()*2),
        spin:(Math.random()-.5)*0.25
    };

    scene.add(p);
    pickups.push(p);
}

function spawnAsteroid(){

    const size=3+Math.random()*4;

    const asteroid=new THREE.Mesh(

        new THREE.IcosahedronGeometry(size,1),

        new THREE.MeshStandardMaterial({

            color:0x553300,
            emissive:0xff6600,
            emissiveIntensity:2,
            roughness:1

        })

    );

    asteroid.position.set(

        (Math.random()-.5)*28,
        (Math.random()-.5)*15,

        camera.position.z-300-Math.random()*500

    );

    asteroid.userData={

        radius:size,

        speed:7+Math.random()*3,

        rx:(Math.random()-.5)*.03,
        ry:(Math.random()-.5)*.03,
        rz:(Math.random()-.5)*.03

    };

    scene.add(asteroid);
    asteroids.push(asteroid);

}

let asteroidStorm=false;
let nextStorm=performance.now()+30000;
let stormEnd=0;

// peaceful start
if(asteroidStorm || asteroids.length<1) spawnAsteroid();


// ------------------------------------------


function updateAsteroids(){

    const now=performance.now();

    if(!asteroidStorm && now>nextStorm){
        asteroidStorm=true;
        showStormWarning();
        Sound.storm();
        stormEnd=now+15000;
        while(asteroids.length<10) if(asteroidStorm || asteroids.length<1) spawnAsteroid();
    }

    if(asteroidStorm && now>stormEnd){
        asteroidStorm=false;
        nextStorm=now+35000;
        while(asteroids.length>1){
            const a=asteroids.pop();
            scene.remove(a);
        }
    }



    // fragments

    asteroidFragments.slice().forEach((f,i)=>{

        if(f.userData.shock){
            f.scale.multiplyScalar(1.12);
            f.material.opacity-=0.04;
            if(f.material.opacity<=0){
                scene.remove(f);
                asteroidFragments.splice(i,1);
                return;
            }
        }else{
        f.position.x+=f.userData.vx;
        f.position.y+=f.userData.vy;
        f.position.z+=f.userData.vz;

        f.rotation.x+=.2;
        f.rotation.y+=.25;

        f.userData.life-=0.03;

        f.material.opacity=f.userData.life;
        f.material.transparent=true;

        }
        if(!f.userData.shock) f.userData.life-=0.03;
        if((!f.userData.shock && f.userData.life<=0)){

            scene.remove(f);
            asteroidFragments.splice(i,1);

        }

    });

    
    pickups.slice().forEach((p,i)=>{
        p.rotation.x+=p.userData.spin;
        p.rotation.y+=0.12;
        p.position.x+=p.userData.vx;
        p.position.y+=p.userData.vy;
        p.position.z+=p.userData.vz;

        const trail=new THREE.Mesh(
            new THREE.SphereGeometry(0.08,4,4),
            new THREE.MeshBasicMaterial({color:p.userData.shield?0x33ccff:0xffdd33,transparent:true,opacity:.35})
        );
        trail.position.copy(p.position);
        scene.add(trail);
        setTimeout(()=>scene.remove(trail),180);
        p.position.z+=4;
        if(Math.abs(ship.position.z-p.position.z)<10 &&
           Math.hypot(ship.position.x-p.position.x,ship.position.y-p.position.y)<2){
            if(p.userData.shield){
                shield=Math.min(100,shield+25);
                floatingMessage("+25 SHIELD","#33ccff");feedback("💙 SHIELD +25","#33ccff");
                Sound.shield();
            }else{
                bulletsLeft=Math.min(maxBullets,bulletsLeft+40);
                floatingMessage("+40 AMMO","#ffee33");feedback("🟡 AMMO +40","#ffee33");
                Sound.ammo();
            }
            scene.remove(p);
            pickups.splice(i,1);
        }
    });

// asteroids

    asteroids.slice().forEach((a,index)=>{

        a.position.z+=a.userData.speed;

        a.rotation.x+=a.userData.rx;
        a.rotation.y+=a.userData.ry;
        a.rotation.z+=a.userData.rz;

        // =============================
        // BULLETS
        // =============================

        bullets.slice().forEach((b,bi)=>{

            if(

                Math.abs(b.position.z-a.position.z)<8 &&

                Math.hypot(

                    b.position.x-a.position.x,
                    b.position.y-a.position.y

                )

                <

                a.userData.radius+1

            ){

                explodeAsteroid(a.position);
		Sound.explosion();
                score+=1000;
                floatingMessage('+1000  METEOR DESTROYED!');feedback('💥 ASTEROID DESTROYED','#ffcc55');
                if(Math.random()<0.45) spawnPickup(a.position);

                scene.remove(b);
                bullets.splice(bi,1);

                scene.remove(a);
                asteroids.splice(index,1);

                if(asteroidStorm || asteroids.length<1) spawnAsteroid();

            }

        });

        // =============================
        // SHIP CRASH
        // =============================

        if(

            Math.abs(ship.position.z-a.position.z)<12 &&

            Math.hypot(

                ship.position.x-a.position.x,
                ship.position.y-a.position.y

            )

            <

            a.userData.radius+1.8

        ){

            explodeAsteroid(a.position);
            Sound.hit();
            Sound.explosion();
            combo=0;

            shield -= 10;
            if(shield<0) shield=0;

            if(shield<=0){
                shield=0;
ui.innerHTML=`Score ${score}<br>Combo x${combo}<br>Shield ${shield}/100<br>Ammo ${bulletsLeft}/${maxBullets}<br>${timeMode.checked?"Time "+timeLeft.toFixed(1):"Endless"}<br>Cyan=Good Red=Avoid Green=+10s`;
                gameOver=true;
                Sound.gameOver();
                showGameOver();
throw new Error("GAME_OVER");
            }

            // REAL BOUNCE

            tx+=(ship.position.x-a.position.x)*6;
            ty+=(ship.position.y-a.position.y)*4;

            camera.position.x+=(Math.random()-.5)*3;
            camera.position.y+=(Math.random()-.5)*3;

            scene.remove(a);
            asteroids.splice(index,1);

            if(asteroidStorm || asteroids.length<1) spawnAsteroid();

        }

        // =============================

        if(a.position.z>camera.position.z+40){

            scene.remove(a);
            asteroids.splice(index,1);

            if(asteroidStorm || asteroids.length<1) spawnAsteroid();

        }

    });

}
</script>
<script>
// ======================================
// ARCADE SOUND ENGINE v2
// ======================================

const Sound = {};

let audio;
let master;

function initAudio(){

    if(audio) return;

    audio = new (window.AudioContext || window.webkitAudioContext)();

    master = audio.createGain();
    master.gain.value = 0.28;
    master.connect(audio.destination);

}

async function unlockAudio(){

    initAudio();

    if(audio.state==="suspended")
        await audio.resume();

}

window.addEventListener("pointerdown",unlockAudio,{once:true});
window.addEventListener("keydown",unlockAudio,{once:true});

// ======================================
// BASIC OSCILLATOR
// ======================================

function osc(type,start,end,duration,volume=.2){

    if(!audio) return;

    const o=audio.createOscillator();
    const g=audio.createGain();

    o.type=type;

    o.frequency.setValueAtTime(start,audio.currentTime);

    o.frequency.exponentialRampToValueAtTime(
        Math.max(end,20),
        audio.currentTime+duration
    );

    g.gain.setValueAtTime(0,audio.currentTime);
    g.gain.linearRampToValueAtTime(
        volume,
        audio.currentTime+.004
    );

    g.gain.exponentialRampToValueAtTime(
        .0001,
        audio.currentTime+duration
    );

    o.connect(g);
    g.connect(master);

    o.start();
    o.stop(audio.currentTime+duration);

}

// ======================================
// SHOT
// ======================================

Sound.shot=function(){

    osc("triangle",1800,260,.08,.09);
    osc("sine",900,500,.05,.04);

}

// ======================================
// EXPLOSION
// 
// ======================================

Sound.explosion=function(){

    osc("triangle",180,40,.28,.20);
    osc("square",90,30,.36,.10);

}

// ======================================
// SHIP HITS ASTEROID
// ======================================

Sound.hit = function(){

    // Low impact
    osc("triangle",180,50,.18,.18);

    // Metallic clang
    setTimeout(()=>{

        osc("square",900,220,.08,.10);

    },12);

    // Crunch
    setTimeout(()=>{

        osc("sawtooth",450,90,.14,.05);

    },25);

}

// ======================================
// SHIELD
// ======================================

Sound.shield=function(){

    osc("triangle",700,1100,.08,.10);

    setTimeout(()=>{

        osc("triangle",900,1700,.08,.08);

    },70);

}

// ======================================
// AMMO
// ======================================

Sound.ammo=function(){

    osc("square",900,1800,.05,.08);

}

// ======================================
// GOOD GATE
// ======================================

Sound.gate=function(){

    osc("triangle",800,1600,.08,.08);

}

// ======================================
// BAD GATE
// ======================================

Sound.badGate=function(){

    osc("square",600,120,.16,.10);

}

// ======================================
// STORM
// ======================================

Sound.storm=function(){

    osc("sawtooth",220,45,.55,.20);

}

// ======================================
// GAME OVER
// ======================================

Sound.gameOver=function(){

    osc("sawtooth",700,70,.9,.14);

}

// ======================================
// LEVEL
// ======================================

Sound.level=function(){

    osc("triangle",700,1100,.08,.08);

    setTimeout(()=>{

        osc("triangle",1100,1800,.08,.08);

    },90);

}

// ======================================
// ENGINE
// ======================================

let engineOsc;
let engineGain;

Sound.engine=function(speed){

    if(!audio) return;

    if(!engineOsc){

        engineOsc=audio.createOscillator();
        engineGain=audio.createGain();

        engineOsc.type="triangle";

        engineOsc.frequency.value=80;

        engineGain.gain.value=.018;

        engineOsc.connect(engineGain);
        engineGain.connect(master);

        engineOsc.start();

    }

    engineOsc.frequency.setTargetAtTime(

        65+speed*16,

        audio.currentTime,

        .12

    );

}
</script>
<script>
// ======================================
// MOBILE + GAMEPAD SUPPORT
// ======================================

const touch = {

    active:false,
    startX:0,
    startY:0

};

// ----------------------
// TOUCH
// ----------------------

window.addEventListener("touchstart",e=>{

    touch.active=true;

    touch.startX=e.touches[0].clientX;
    touch.startY=e.touches[0].clientY;

},{passive:true});

window.addEventListener("touchmove",e=>{

    if(!touch.active) return;

    const x=e.touches[0].clientX;
    const y=e.touches[0].clientY;

    const dx=x-touch.startX;
    const dy=y-touch.startY;

    keys.arrowleft  = dx<-30;
    keys.arrowright = dx>30;

    keys.arrowup    = dy<-30;
    keys.arrowdown  = dy>30;

},{passive:true});

window.addEventListener("touchend",()=>{

    touch.active=false;

    keys.arrowleft=false;
    keys.arrowright=false;
    keys.arrowup=false;
    keys.arrowdown=false;

});

// ----------------------
// DOUBLE TAP = SHOOT
// ----------------------

let lastTap=0;

window.addEventListener("touchend",e=>{

    const now=Date.now();

    if(now-lastTap<250){

        shoot();

    }

    lastTap=now;

});

// ----------------------
// TWO FINGERS = BOOST
// ----------------------

window.addEventListener("touchmove",e=>{

    keys.shift=e.touches.length>=2;

},{passive:true});

// ======================================
// GAMEPAD
// ======================================

function updateGamepad(){

    const gp=navigator.getGamepads()[0];

    if(!gp) return;

    // Left stick

    keys.arrowleft  = gp.axes[0]<-.25;
    keys.arrowright = gp.axes[0]>.25;

    keys.arrowup    = gp.axes[1]<-.25;
    keys.arrowdown  = gp.axes[1]>.25;

    // A / Cross

    if(gp.buttons[0].pressed){

        shoot();

    }

    // Right Trigger

    keys.shift=

        gp.buttons[7] &&

        gp.buttons[7].value>.4;

}

setInterval(updateGamepad,16);

</script>
