<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Retro WebRTC Arcade Desktop</title>


<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<style>

html,body{

margin:0;
width:100%;
height:100%;

background:#000;
color:#00ff55;

font-family:monospace;

overflow:hidden;

text-align:center;

}


#offerScreen{

width:100%;
height:100%;

display:flex;

align-items:center;
justify-content:center;

flex-direction:column;

}


#offerQR{

background:white;

padding:20px;

}



button{

margin-top:20px;

padding:15px 25px;

font-size:20px;

background:#111;

color:#00ff55;

border:3px solid #00ff55;

border-radius:10px;

}



/* SCANNER */


#scannerScreen{

display:none;

position:relative;

width:100%;
height:100%;

}



#reader{

width:100%;
height:100%;

}



#reader video{

width:100%!important;

height:100%!important;

object-fit:cover!important;

}



.scan-frame{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);


width:500px;

height:500px;


border:4px solid #00ff55;


box-shadow:

0 0 30px #00ff55;


z-index:10;

}



.scan-title{

position:absolute;

top:30px;

width:100%;

font-size:24px;

z-index:20;

}



/* GAME */


#game{

display:none;

position:relative;

width:100%;
height:100%;

background:#050505;

}


#player{

position:absolute;

width:50px;

height:50px;

background:#00ff55;

box-shadow:

0 0 20px #00ff55;

}



</style>

</head>


<body>



<div id="offerScreen">


<h1>
SCAN WITH PHONE
</h1>


<div id="offerQR"></div>


<h2 id="status">
Creating connection...
</h2>



<button onclick="startAnswerScanner()">

SCAN PHONE QR

</button>


</div>





<div id="scannerScreen">


<div class="scan-title">

SCAN PHONE QR

</div>


<div id="reader"></div>


<div class="scan-frame"></div>


</div>







<div id="game">

<div id="player"></div>

</div>







<script>


let pc;

let channel;



let player =
document.getElementById("player");


let x=300;
let y=200;



function move(dx,dy){

x+=dx;
y+=dy;

player.style.left=x+"px";
player.style.top=y+"px";

}






async function createConnection(){



pc =
new RTCPeerConnection({

iceServers:[]

});




channel =
pc.createDataChannel("arcade");





channel.onopen=()=>{

console.log("CONNECTED");

startGame();

};





channel.onmessage=e=>{


switch(e.data){

case "UP":
move(0,-20);
break;

case "DOWN":
move(0,20);
break;

case "LEFT":
move(-20,0);
break;

case "RIGHT":
move(20,0);
break;

}

};





await pc.setLocalDescription(

await pc.createOffer()

);





pc.onicecandidate=e=>{


if(!e.candidate){

showOfferQR();

}


};



}







function showOfferQR(){



document
.getElementById("offerQR")
.innerHTML="";



new QRCode(

document.getElementById("offerQR"),

{

text:

JSON.stringify(
pc.localDescription
),


width:500,

height:500,


correctLevel:
QRCode.CorrectLevel.L


}

);



document
.getElementById("status")
.innerHTML=
"Waiting for phone...";


}









async function startAnswerScanner(){



await navigator.mediaDevices.getUserMedia({

video:true,

audio:false

});





document
.getElementById("offerScreen")
.style.display="none";



document
.getElementById("scannerScreen")
.style.display="block";





const scanner =
new Html5Qrcode("reader");







await scanner.start(


{

facingMode:"user"

},




{


fps:20,


qrbox:{

width:600,

height:600

},


aspectRatio:1.0



},




async text=>{


console.log(
"ANSWER QR RECEIVED:",
text.length
);



await scanner.stop();





let answer =
JSON.parse(text);





await pc.setRemoteDescription(answer);



},



error=>{}



);



}









function startGame(){



document
.getElementById("scannerScreen")
.style.display="none";



document
.getElementById("game")
.style.display="block";


}







createConnection();



</script>


</body>

</html>
