<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Retro Arcade Controller</title>


<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<style>

html,body{

margin:0;
width:100%;
height:100%;

background:#000;

color:#00ff55;

font-family:monospace;

overflow:hidden;

text-align:center;

}



/* SCAN */


#scan{

position:relative;

width:100%;
height:100%;

}



#reader{

width:100%;
height:100%;

}



#reader video{

width:100%!important;
height:100%!important;

object-fit:cover!important;

}



#qr-shaded-region{

display:none!important;

}




.scan-frame{

position:absolute;

top:50%;
left:50%;


transform:
translate(-50%,-50%);


width:400px;

height:400px;


border:4px solid #00ff55;


box-shadow:

0 0 30px #00ff55;


z-index:10;


}




.title{

position:absolute;

top:30px;

width:100%;

font-size:24px;

z-index:20;

}






/* ANSWER QR */


#answer{


display:none;


width:100%;

height:100%;


align-items:center;

justify-content:center;


flex-direction:column;


}



#answerQR{


background:white;

padding:20px;


}





/* CONTROLLER */


#controller{


display:none;


height:100%;


}



button{


width:90px;

height:90px;


margin:10px;


font-size:45px;


background:#111;


border:3px solid #00ff55;


color:#00ff55;


border-radius:20px;


}



</style>


</head>


<body>




<!-- STEP 1 -->


<div id="scan">


<div class="title">
SCAN DESKTOP QR
</div>



<div id="reader"></div>


<div class="scan-frame"></div>


</div>







<!-- STEP 2 -->


<div id="answer">


<h1>
SCAN WITH DESKTOP
</h1>


<div id="answerQR"></div>


</div>







<!-- STEP 3 -->


<div id="controller">


<h1>
RETRO CONTROLLER
</h1>




<div>

<button ontouchstart="send('UP')">
▲
</button>


</div>





<div>


<button ontouchstart="send('LEFT')">
◀
</button>



<button ontouchstart="send('DOWN')">
▼
</button>



<button ontouchstart="send('RIGHT')">
▶
</button>



</div>



<button ontouchstart="send('FIRE')">
A
</button>



</div>








<script>


let pc;

let channel;





function send(command){


if(channel && channel.readyState==="open"){


channel.send(command);


}


}








// -------------------------
// SCANNER
// -------------------------



const scanner =
new Html5Qrcode("reader");







async function startScanner(){



await scanner.start(


{

facingMode:"environment"

},


{


fps:15,


qrbox:{


width:400,

height:400


}


},



qrFound,



error=>{}


);



}








// -------------------------
// DESKTOP OFFER FOUND
// -------------------------


async function qrFound(text){



await scanner.stop();





document
.getElementById("scan")
.style.display="none";





let offer =
JSON.parse(text);






pc =
new RTCPeerConnection({


iceServers:[]


});







pc.ondatachannel=e=>{


channel=e.channel;



channel.onopen=()=>{


showController();


};


};








await pc.setRemoteDescription(offer);








let answer =

await pc.createAnswer();








await pc.setLocalDescription(answer);







waitForICE();





}









// -------------------------
// ANSWER QR
// -------------------------


function waitForICE(){



if(pc.iceGatheringState==="complete"){


showAnswer();

return;


}





pc.onicecandidate=()=>{


if(pc.iceGatheringState==="complete"){


showAnswer();


}


};


}









function showAnswer(){



document
.getElementById("answer")
.style.display="flex";





new QRCode(


document.getElementById("answerQR"),



{


text:

JSON.stringify(
pc.localDescription
),



width:500,

height:500,


correctLevel:
QRCode.CorrectLevel.L


}



);



}









// -------------------------
// CONTROLLER
// -------------------------



function showController(){



document
.getElementById("answer")
.style.display="none";



document
.getElementById("controller")
.style.display="block";



}







startScanner();



</script>


</body>

</html>
