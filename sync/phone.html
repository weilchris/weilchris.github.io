<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Phone Controller</title>

<script src="https://cdn.jsdelivr.net/npm/simple-peer/simplepeer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
:root{
  --bg:#1b1b1b;
  --panel:#222;
  --border:#333;
  --text:#eaeaea;
  --muted:#9a9a9a;
  --accent:#6cff7a;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui, sans-serif;
  overflow:hidden;
  text-align:center;
}

/* TITLE */
h3{
  margin:12px 0;
  font-size:13px;
  color:var(--muted);
  letter-spacing:1px;
}

/* CAMERA */
video{
  width:100%;
  max-height:45vh;
  background:#000;
  object-fit:cover;
  border:1px solid var(--border);
  border-radius:10px;
  display:block;
}

/* JOYSTICK */
#pad{
  width:180px;
  height:180px;
  margin:20px auto;

  border-radius:50%;
  background:var(--panel);
  border:1px solid var(--border);

  touch-action:none;
  position:relative;
}

/* GLOW */
#pad::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:radial-gradient(circle, rgba(108,255,122,0.08), transparent 60%);
}

/* OUTPUT */
#out{
  margin-top:10px;
  padding:10px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  min-height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* QR canvas */
#out canvas{
  max-width:260px;
  width:100%;
}

/* CONNECTED */
.connected{
  color:var(--accent);
  font-weight:600;
}
</style>
</head>

<body>

<h3>📱 Controller (scan desktop QR)</h3>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="pad"></div>

<div id="out"></div>

<script>

let peer = null;
let dx = 0, dy = 0;
let connected = false;

// ---------------- JOYSTICK ----------------
const pad = document.getElementById("pad");

pad.addEventListener("touchmove", (e) => {
  const t = e.touches[0];
  dx = (t.clientX - window.innerWidth/2) / 60;
  dy = (t.clientY - window.innerHeight/2) / 60;
});

pad.addEventListener("touchend", () => {
  dx = 0;
  dy = 0;
});

// ---------------- CAMERA ----------------
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  video.srcObject = stream;
  scan();
}).catch(err => {
  alert("Camera error: " + err);
});

// ---------------- QR SCAN LOOP ----------------
function scan() {
  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, canvas.width, canvas.height);

    if (code) {
      handleQR(code.data);
      return;
    }
  }

  requestAnimationFrame(scan);
}

// ---------------- DECODE OFFER ----------------
function decodeOffer(text) {
  try {
    if (!text.startsWith("WG:OFFER:")) return null;

    const raw = text.split("WG:OFFER:")[1];
    return JSON.parse(atob(raw));
  } catch (e) {
    console.error("decode error", e);
    return null;
  }
}

// ---------------- HANDLE OFFER ----------------
function handleQR(data) {

  const offer = decodeOffer(data);
  if (!offer) return;

  document.getElementById("out").innerHTML = "connecting...";

  peer = new SimplePeer({
    initiator: false,
    trickle: false
  });

  // IMPORTANT: THIS IS WHAT YOU WERE MISSING
  peer.on("signal", answer => {

    const encoded = "WG:ANSWER:" + btoa(JSON.stringify(answer));

    const container = document.getElementById("out");
    container.innerHTML = "";

    // CREATE QR CODE (NOT TEXT)
    const canvasQR = document.createElement("canvas");
    container.appendChild(canvasQR);

    QRCode.toCanvas(canvasQR, encoded, function (err) {
      if (err) console.error(err);
    });

  });

  peer.on("connect", () => {
    connected = true;
    document.getElementById("out").innerHTML = "CONNECTED 🎮";
  });

  peer.signal(offer);

  // send input loop
  setInterval(() => {
    if (peer && connected) {
      peer.send(JSON.stringify({ dx, dy }));
    }
  }, 30);
}

</script>

</body>
</html>
