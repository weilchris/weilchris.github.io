<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Retro Arcade Controller</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<style>

html,body{

margin:0;
width:100%;
height:100%;

background:#000;

color:#00ff55;

font-family:monospace;

overflow:hidden;

text-align:center;

}


#scan,
#answer,
#controller{

width:100%;
height:100%;

}


#reader{

width:100%;
height:100%;

}


#reader video{

width:100%!important;
height:100%!important;

object-fit:cover!important;

}



.scan-frame{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:75vw;
height:75vw;

max-width:400px;
max-height:400px;

border:4px solid #00ff55;

box-shadow:0 0 30px #00ff55;

}



.title{

position:absolute;

top:30px;

width:100%;

font-size:24px;

z-index:5;

}



#answer,
#controller{

display:none;

align-items:center;

justify-content:center;

flex-direction:column;

}



#answerQR{

background:white;

padding:20px;

}



button{

width:90px;
height:90px;

margin:10px;

font-size:45px;

background:#111;

color:#00ff55;

border:3px solid #00ff55;

border-radius:20px;

}


</style>

</head>


<body>


<div id="scan">

<div class="title">
SCAN DESKTOP QR
</div>

<div id="reader"></div>

<div class="scan-frame"></div>

</div>




<div id="answer">

<h1>
SCAN WITH DESKTOP
</h1>

<div id="answerQR"></div>

</div>




<div id="controller">

<h1>
RETRO CONTROLLER
</h1>


<button ontouchstart="send('UP')">
▲
</button>


<div>

<button ontouchstart="send('LEFT')">
◀
</button>


<button ontouchstart="send('DOWN')">
▼
</button>


<button ontouchstart="send('RIGHT')">
▶
</button>

</div>


<button ontouchstart="send('FIRE')">
A
</button>


</div>





<script>


let pc;

let channel;

let scanner;



function send(cmd){

if(channel &&
channel.readyState==="open"){

channel.send(cmd);

}

}





async function startScanner(){


await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
}
},

audio:false

});



scanner =
new Html5Qrcode("reader");



scanner.start(

{
facingMode:"environment"
},

{

fps:20,

qrbox:{
width:500,
height:500
}

},


offerFound,


()=>{}

);


}






async function offerFound(text){


await scanner.stop();



document
.getElementById("scan")
.style.display="none";



let offer =
JSON.parse(text);



pc =
new RTCPeerConnection({

iceServers:[]

});




pc.ondatachannel=e=>{


channel=e.channel;


channel.onopen=()=>{

showController();

};


};





await pc.setRemoteDescription(offer);




let answer =
await pc.createAnswer();



await pc.setLocalDescription(answer);



await waitICE();



showAnswer();



}







function waitICE(){


return new Promise(resolve=>{


if(
pc.iceGatheringState==="complete"
){

resolve();

return;

}



pc.onicegatheringstatechange=()=>{


if(
pc.iceGatheringState==="complete"
){

resolve();

}


};



});


}







function showAnswer(){



document
.getElementById("answer")
.style.display="flex";



new QRCode(

document.getElementById("answerQR"),

{

text:
JSON.stringify(
pc.localDescription
),

width:500,

height:500

}

);



}







function showController(){


document
.getElementById("answer")
.style.display="none";


document
.getElementById("controller")
.style.display="flex";


}





startScanner();



</script>


</body>

</html>
