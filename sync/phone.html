<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Phone Controller</title>

<script src="https://cdn.jsdelivr.net/npm/simple-peer/simplepeer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
:root{
  --bg:#1b1b1b;
  --panel:#222;
  --border:#333;
  --text:#eaeaea;
  --muted:#9a9a9a;
  --accent:#6cff7a;
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui, sans-serif;
  overflow:hidden;
}

/* APP */
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
#topbar{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;

  background:#151515;
  border-bottom:1px solid var(--border);

  font-size:13px;
  letter-spacing:0.6px;
  color:var(--muted);
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:12px;
  overflow:hidden;
}

/* PANELS */
.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.title{
  font-size:12px;
  color:var(--muted);
  letter-spacing:1px;
}

/* CAMERA */
#video{
  width:100%;
  max-height:38vh;
  background:#000;
  border-radius:10px;
  object-fit:cover;
}

/* JOYSTICK */
#padWrap{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

#pad{
  width:180px;
  height:180px;
  border-radius:50%;
  background:#2a2a2a;
  border:1px solid var(--border);

  touch-action:none;
  position:relative;
  overflow:hidden;
}

/* inner glow */
#pad::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:radial-gradient(circle, rgba(108,255,122,0.08), transparent 60%);
}

/* QR output */
#out{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

/* status */
#status{
  font-size:12px;
  color:var(--muted);
  text-align:center;
}

/* MOBILE SAFE */
@media (min-width: 800px){
  #video{
    max-height:45vh;
  }
}
</style>
</head>

<body>

<div id="app">

  <div id="topbar">
    PHONE CONTROLLER • DEVICE LINK
  </div>

  <div id="main">

    <div class="panel">
      <div class="title">STEP 1 — SCAN DESKTOP QR</div>
      <video id="video" autoplay playsinline></video>
    </div>

    <div class="panel">
      <div class="title">STEP 2 — CONTROLLER</div>

      <div id="padWrap">
        <div id="pad"></div>
      </div>
    </div>

    <div class="panel">
      <div class="title">PAIRING OUTPUT</div>
      <div id="out"></div>
    </div>

    <div id="status">waiting for connection...</div>

  </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

let peer = null;
let dx = 0, dy = 0;
let connected = false;

/* ---------------- JOYSTICK ---------------- */
const pad = document.getElementById("pad");

pad.addEventListener("touchmove", (e) => {
  const t = e.touches[0];

  dx = (t.clientX - window.innerWidth/2) / 60;
  dy = (t.clientY - window.innerHeight/2) / 60;
});

pad.addEventListener("touchend", () => {
  dx = 0;
  dy = 0;
});

/* ---------------- CAMERA ---------------- */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let scanning = true;
let lastScan = 0;
const SCAN_INTERVAL = 140;

navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: { ideal: "environment" }
  }
}).then(stream => {
  video.srcObject = stream;
  return video.play();
}).then(() => {
  requestAnimationFrame(scan);
}).catch(err => {
  alert("Camera error: " + err);
});

function scan() {

  if (video.readyState >= 2) {

    const w = video.videoWidth;
    const h = video.videoHeight;

    if (w && h) {

      canvas.width = w;
      canvas.height = h;

      ctx.drawImage(video, 0, 0, w, h);

      const img = ctx.getImageData(0, 0, w, h);

      const code = jsQR(img.data, w, h);

      if (code) {
        handleQR(code.data);
        return;
      }
    }
  }

  requestAnimationFrame(scan);
}

/* ---------------- DECODE ---------------- */
function decodeOffer(text){
  if(!text.startsWith("WG:OFFER:")) return null;

  const raw = text.split("WG:OFFER:")[1];
  return JSON.parse(atob(raw));
}

/* ---------------- HANDLE ---------------- */
function handleQR(data){

  const offer = decodeOffer(data);
  if(!offer) return;

  document.getElementById("status").innerText = "connecting...";

  peer = new SimplePeer({
    initiator:false,
    trickle:false
  });

  peer.on("signal", answer => {

    const encoded = "WG:ANSWER:" + btoa(JSON.stringify(answer));

    const out = document.getElementById("out");
    out.innerHTML = "";

    const qr = document.createElement("canvas");
    out.appendChild(qr);

QRCode.toCanvas(qr, encoded, {
  width: 280,
  margin: 1,
  errorCorrectionLevel: "L"
});

  });

  peer.on("connect", () => {
    connected = true;
    document.getElementById("status").innerText = "CONNECTED ✓";
  });

  peer.signal(offer);

  /* INPUT LOOP */
  setInterval(() => {
    if(peer && connected){
      peer.send(JSON.stringify({ dx, dy }));
    }
  }, 30);
}

</script>

</body>
</html>
