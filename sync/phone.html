<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SYNC Phone Controller</title>

<script src="https://cdn.jsdelivr.net/npm/simple-peer/simplepeer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
:root{
  --bg:#1b1b1b;
  --panel:#262626;
  --panel2:#2f2f2f;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#4ade80;
  --radius:18px;
}

*{
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* Layout */
.wrapper{
  display:flex;
  flex-direction:column;
  height:100vh;
  padding:16px;
  gap:12px;
}

/* Card */
.card{
  background:var(--panel);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:0 10px 40px rgba(0,0,0,.35);
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* Camera */
video{
  width:100%;
  border-radius:12px;
  background:black;
}

/* Joystick zone */
#pad{
  flex:1;
  background:var(--panel2);
  border-radius:var(--radius);
  touch-action:none;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
}

/* QR output */
#out{
  display:flex;
  justify-content:center;
}

/* Toast */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2f2f2f;
  padding:12px 18px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.45);
  opacity:0;
  transition:.25s;
  pointer-events:none;
}

.toast.show{
  opacity:1;
  top:35px;
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="wrapper">

  <!-- CAMERA -->
  <div class="card">
    <div>📷 Scan desktop QR</div>
    <video id="video" autoplay playsinline></video>
  </div>

  <!-- JOYSTICK -->
  <div id="pad">Move finger here</div>

  <!-- ANSWER QR -->
  <div class="card">
    <div>📡 Show this to desktop</div>
    <div id="out"></div>
  </div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

/* ---------------- UI ---------------- */
const toastEl = document.getElementById("toast");

function notify(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(window.__t);
  window.__t = setTimeout(()=>{
    toastEl.classList.remove("show");
  },2000);
}

/* ---------------- JOYSTICK ---------------- */
let dx = 0, dy = 0;

const pad = document.getElementById("pad");

pad.addEventListener("touchmove", (e)=>{
  const t = e.touches[0];
  dx = (t.clientX - window.innerWidth/2)/60;
  dy = (t.clientY - window.innerHeight/2)/60;
});

pad.addEventListener("touchend", ()=>{
  dx = 0;
  dy = 0;
});

/* ---------------- CAMERA ---------------- */
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
}).then(stream=>{
  video.srcObject = stream;
  scan();
});

/* ---------------- SCAN LOOP ---------------- */
function scan(){
  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    const code = jsQR(img.data, canvas.width, canvas.height);

    if(code){
      handleOffer(code.data);
      return;
    }
  }
  requestAnimationFrame(scan);
}

/* ---------------- DECODE ---------------- */
function decode(text){
  if(!text.startsWith("WG:OFFER:")) return null;

  const raw = text.split("WG:OFFER:")[1];
  return JSON.parse(atob(raw));
}

/* ---------------- WEBRTC ---------------- */
let pc;
let channel;

/* ---------------- HANDLE OFFER ---------------- */
function handleOffer(text){

  const offer = decode(text);
  if(!offer) return;

  notify("📡 Offer received");

  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.ondatachannel = (e)=>{
    channel = e.channel;
  };

  pc.oniceconnectionstatechange = ()=>{
    if(pc.iceConnectionState === "connected"){
      notify("✅ Connected");
    }
  };

  pc.setRemoteDescription(offer)
    .then(()=>pc.createAnswer())
    .then(a=>pc.setLocalDescription(a))
    .then(()=>{

      const encoded = "WG:ANSWER:" + btoa(JSON.stringify(pc.localDescription));

      const out = document.getElementById("out");
      out.innerHTML = "";

      const qr = document.createElement("canvas");
      out.appendChild(qr);

      QRCode.toCanvas(qr, encoded, {
        width:220
      });

      notify("📡 Show QR to desktop");
    });

}

/* ---------------- SEND INPUT ---------------- */
setInterval(()=>{
  if(channel && channel.readyState === "open"){
    channel.send(JSON.stringify({dx,dy}));
  }
},30);

</script>

</body>
</html>
