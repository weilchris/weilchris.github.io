<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Phone</title>
<script src="https://cdn.jsdelivr.net/npm/simple-peer/simplepeer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body style="margin:0;background:#222;color:white;text-align:center;font-family:sans-serif;">

<h3>📱 Controller</h3>

<video id="v" autoplay playsinline style="width:100%;"></video>
<canvas id="c" style="display:none;"></canvas>

<div id="out"></div>

<script>

let peer;
let dx = 0, dy = 0;

// decode OFFER
function decode(text){
  if(text.startsWith("WG:OFFER:")){
    return JSON.parse(atob(text.split("WG:OFFER:")[1]));
  }
  return null;
}

// camera scan
const video = document.getElementById("v");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{
  video.srcObject = stream;
  scan();
});

function scan(){
  if(video.readyState === 4){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    const code = jsQR(img.data, canvas.width, canvas.height);

    if(code){
      start(code.data);
      return;
    }
  }
  requestAnimationFrame(scan);
}

// joystick (simple)
window.addEventListener("touchmove", e=>{
  const t = e.touches[0];
  dx = (t.clientX - window.innerWidth/2)/60;
  dy = (t.clientY - window.innerHeight/2)/60;
});

// STEP 2: create ANSWER QR
function start(qr){

  const offer = decode(qr);
  if(!offer) return;

  peer = new SimplePeer({
    initiator:false,
    trickle:false
  });

  peer.on("signal", answer=>{
    const encoded = "WG:ANSWER:" + btoa(JSON.stringify(answer));

    const ta = document.createElement("textarea");
    ta.style.width="90%";
    ta.style.height="100px";
    ta.value = encoded;

    document.getElementById("out").innerHTML="";
    document.getElementById("out").appendChild(ta);
  });

  peer.signal(offer);

  setInterval(()=>{
    if(peer.connected){
      peer.send(JSON.stringify({dx,dy}));
    }
  },30);
}

</script>

</body>
</html>
