<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Desktop Host</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</head>
<style>
:root{
  --bg:#1b1b1b;
  --panel:#222;
  --border:#333;
  --text:#eaeaea;
  --muted:#9a9a9a;
  --accent:#6cff7a;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui, sans-serif;
  overflow:hidden;
}

/* GAME CANVAS */
canvas#game{
  width:100vw;
  height:100vh;
  display:block;
  background:#000;
}

/* FLOATING UI PANEL */
#ui{
  position:fixed;
  top:10px;
  left:10px;

  width:260px;
  display:flex;
  flex-direction:column;
  gap:10px;

  z-index:10;
}

/* PANEL STYLE */
.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* TEXT */
.title{
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
}

/* QR CANVAS */
#qr{
  width:100%;
  height:auto;
  background:#fff;
  border-radius:6px;
}

/* VIDEO PREVIEW */
video{
  width:100%;
  border-radius:8px;
  background:#000;
}

/* STATUS */
#status{
  font-size:12px;
  color:var(--muted);
}

/* CONNECTED STATE */
.connected{
  color:var(--accent);
  font-weight:500;
}
</style>
<body>

<canvas id="game"></canvas>

<div style="position:fixed;top:10px;left:10px;background:black;padding:10px;">
  <div>📡 STEP 1: scan with phone</div>
  <canvas id="qr"></canvas>

  <div style="margin-top:10px;">📥 STEP 3: scan phone QR</div>
  <video id="v" autoplay playsinline style="width:200px;"></video>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let x = 200, y = 200;

// WebRTC
const pc = new RTCPeerConnection();
const channel = pc.createDataChannel("game");

channel.onmessage = e=>{
  const d = JSON.parse(e.data);
  x += d.dx * 8;
  y += d.dy * 8;
};

// encode helper
const enc = (t,d)=>"WG:"+t+":"+btoa(JSON.stringify(d));

// STEP 1: OFFER QR
pc.createOffer().then(async offer=>{
  await pc.setLocalDescription(offer);

  QRCode.toCanvas(
    document.getElementById("qr"),
    enc("OFFER", pc.localDescription)
  );
});

// STEP 3: scan ANSWER from phone
const video = document.getElementById("v");
const c = document.createElement("canvas");
const cx = c.getContext("2d");

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
  video.srcObject = stream;
  scan();
});

function scan(){
  if(video.readyState === 4){
    c.width = video.videoWidth;
    c.height = video.videoHeight;

    cx.drawImage(video,0,0);

    const img = cx.getImageData(0,0,c.width,c.height);
    const code = jsQR(img.data, c.width, c.height);

    if(code){
      handle(code.data);
      return;
    }
  }
  requestAnimationFrame(scan);
}

async function handle(text){
  if(!text.startsWith("WG:ANSWER:")) return;

  const raw = text.split("WG:ANSWER:")[1];
  const answer = JSON.parse(atob(raw));

  await pc.setRemoteDescription(answer);
  console.log("CONNECTED");
}

// game
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="lime";
  ctx.fillRect(x,y,40,40);
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
