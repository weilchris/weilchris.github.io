<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Desktop Host</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

#game{
    display:block;
}

#panel{
    position:fixed;
    top:10px;
    left:10px;
    width:460px;
    background:#000;
    padding:15px;
    border-radius:10px;
    z-index:10;
}

#qr{
    background:white;
    margin-top:10px;
}

#cameraBox{
    position:relative;
    margin-top:15px;
}

#v{
    width:260px;
    height:180px;
    background:black;
    object-fit:cover;
}

#scanFrame{
    position:absolute;
    left:50%;
    top:50%;
    width:130px;
    height:130px;
    transform:translate(-50%,-50%);
    border:3px solid #55ff55;
    pointer-events:none;
}

#status{
    margin-top:10px;
    color:#55ff55;
}

</style>

</head>


<body>


<canvas id="game"></canvas>


<div id="panel">

<div>
📡 STEP 1: Scan this QR with phone
</div>

<canvas id="qr"></canvas>


<div style="margin-top:15px;">
📥 STEP 3: Scan phone answer QR
</div>


<div id="cameraBox">

<video id="v" autoplay playsinline></video>

<div id="scanFrame"></div>

</div>


<div id="status">
waiting...
</div>


</div>



<script>


// ---------------- GAME ----------------


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");


function resize(){

    canvas.width=innerWidth;
    canvas.height=innerHeight;

}

resize();

window.addEventListener(
    "resize",
    resize
);


let x=200;
let y=200;



// ---------------- WEBRTC ----------------


const pc=new RTCPeerConnection();


const channel=pc.createDataChannel(
    "game"
);



channel.onmessage=e=>{

    const d=JSON.parse(e.data);

    x+=d.dx*8;
    y+=d.dy*8;

};



let connected=false;



// ---------------- QR ENCODE ----------------


function enc(type,data){

    return "WG:"+type+":"+btoa(
        JSON.stringify(data)
    );

}



// ---------------- CREATE OFFER ----------------


async function createOffer(){


    const offer=
        await pc.createOffer();


    await pc.setLocalDescription(
        offer
    );


    const qrData=
        enc(
            "OFFER",
            pc.localDescription
        );


    QRCode.toCanvas(

        document.getElementById("qr"),

        qrData,

        {
            width:420,
            margin:2,
            errorCorrectionLevel:"L"
        }

    );


}



createOffer();


// ---------------- SCAN ANSWER QR ----------------


const video=document.getElementById("v");

const scanCanvas=document.createElement("canvas");
const scanCtx=scanCanvas.getContext("2d");


let scanning=true;



async function startCamera(){


    try{


        const stream=
            await navigator.mediaDevices.getUserMedia({

                video:{
                    facingMode:{
                        ideal:"environment"
                    },

                    width:{
                        ideal:1920
                    },

                    height:{
                        ideal:1080
                    }

                }

            });


        video.srcObject=stream;


        scan();


    }catch(err){

        document.getElementById("status").innerHTML=
            "Camera error: "+err;

    }


}



startCamera();




function scan(){


    if(!scanning){
        return;
    }


    if(video.readyState===4){


        scanCanvas.width=
            video.videoWidth;


        scanCanvas.height=
            video.videoHeight;



        scanCtx.drawImage(

            video,

            0,
            0,

            scanCanvas.width,
            scanCanvas.height

        );



        /*
          Scan only center area.
          This avoids reflections
          and improves speed.
        */


        const size=
            Math.min(
                scanCanvas.width,
                scanCanvas.height
            )*0.65;



        const sx=
            (scanCanvas.width-size)/2;


        const sy=
            (scanCanvas.height-size)/2;



        const img=
            scanCtx.getImageData(

                sx,
                sy,
                size,
                size

            );



        const code=
            jsQR(

                img.data,

                size,

                size,

                {
                    inversionAttempts:
                    "attemptBoth"
                }

            );



        if(code){


            scanning=false;


            stopCamera();


            handleAnswerQR(
                code.data
            );


            return;

        }


    }



    requestAnimationFrame(scan);


}





function stopCamera(){


    if(video.srcObject){


        video.srcObject
        .getTracks()
        .forEach(
            t=>t.stop()
        );


    }


}





// ---------------- HANDLE ANSWER ----------------



async function handleAnswerQR(text){


    if(!text.startsWith("WG:ANSWER:")){


        document.getElementById("status").innerHTML=
            "Invalid QR";


        scanning=true;

        scan();


        return;

    }




    try{


        const raw=
            text.split(
                "WG:ANSWER:"
            )[1];



        const answer=
            JSON.parse(
                atob(raw)
            );



        await pc.setRemoteDescription(
            answer
        );



        document.getElementById("status").innerHTML=
            "CONNECTED 🎮";



    }catch(e){


        console.error(e);


        document.getElementById("status").innerHTML=
            "Decode error";


    }


}




// ---------------- CONNECTION EVENTS ----------------



pc.onconnectionstatechange=()=>{


    if(
        pc.connectionState==="connected"
    ){

        connected=true;


        document.getElementById("status").innerHTML=
            "CONNECTED 🎮";


    }


};



pc.oniceconnectionstatechange=()=>{


    console.log(
        "ICE:",
        pc.iceConnectionState
    );


};


// ---------------- GAME LOOP ----------------


function loop(){


    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );


    ctx.fillStyle="lime";


    ctx.fillRect(
        x,
        y,
        40,
        40
    );


    requestAnimationFrame(
        loop
    );


}


loop();



</script>

</body>
</html>
