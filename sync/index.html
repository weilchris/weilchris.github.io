<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SYNC Console Pairing</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
:root{
  --bg:#1b1b1b;
  --panel:#262626;
  --panel2:#2f2f2f;
  --text:#ffffff;
  --muted:#bdbdbd;
  --accent:#4ade80;
  --danger:#f59e0b;
  --radius:18px;
}

*{box-sizing:border-box;font-family:sans-serif;}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* Layout */
.wrapper{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  height:100vh;
  padding:16px;
}

/* Cards */
.card{
  background:var(--panel);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:0 10px 40px rgba(0,0,0,.35);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.title{
  font-size:14px;
  color:var(--muted);
}

/* QR */
#qr{
  background:white;
  padding:10px;
  border-radius:12px;
  width:fit-content;
}

/* Camera */
video{
  width:100%;
  border-radius:12px;
  background:black;
}

/* Status */
#status{
  padding:10px;
  border-radius:12px;
  background:var(--panel2);
  font-size:14px;
  color:var(--muted);
}

/* Game */
#game{
  width:100%;
  height:100%;
  background:#111;
  border-radius:12px;
}

/* Toast */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2f2f2f;
  padding:12px 18px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.45);
  opacity:0;
  transition:.25s;
  pointer-events:none;
}

.toast.show{
  opacity:1;
  top:35px;
}

/* Responsive */
@media(max-width:900px){
  .wrapper{
    grid-template-columns:1fr;
    overflow:auto;
  }
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="wrapper">

  <!-- LEFT: QR -->
  <div class="card">
    <div class="title">STEP 1 — Scan with phone</div>
    <div id="qr"></div>
    <div id="status">Waiting for connection…</div>
  </div>

  <!-- RIGHT: CAMERA -->
  <div class="card">
    <div class="title">STEP 2 — Scan phone answer</div>
    <video id="video" autoplay playsinline></video>
  </div>

</div>

<canvas id="game"></canvas>

<script>

/* ---------------- UI ---------------- */
const toastEl = document.getElementById("toast");

function notify(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(window.__t);
  window.__t = setTimeout(()=>{
    toastEl.classList.remove("show");
  },2000);
}

/* ---------------- GAME ---------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let x = 200, y = 200;

/* ---------------- WEBRTC ---------------- */
const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let channel;

pc.ondatachannel = (e)=>{
  channel = e.channel;

  channel.onmessage = (msg)=>{
    const d = JSON.parse(msg.data);
    x += d.dx * 10;
    y += d.dy * 10;
  };
};

/* ---------------- QR HELPERS ---------------- */
function encode(type, data){
  return "WG:"+type+":"+btoa(JSON.stringify(data));
}

/* ---------------- OFFER ---------------- */
async function createOffer(){
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const qrData = encode("OFFER", pc.localDescription);

  QRCode.toCanvas(document.getElementById("qr"), qrData, {
    width:220
  });

  notify("📡 QR ready");
}

createOffer();

/* ---------------- CAMERA SCAN ---------------- */
const video = document.getElementById("video");
const c = document.createElement("canvas");
const cx = c.getContext("2d");

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
  video.srcObject = stream;
  scan();
});

function scan(){
  if(video.readyState === 4){

    c.width = video.videoWidth;
    c.height = video.videoHeight;

    cx.drawImage(video,0,0);

    const img = cx.getImageData(0,0,c.width,c.height);
    const code = jsQR(img.data, c.width, c.height);

    if(code){
      handleAnswer(code.data);
      return;
    }
  }
  requestAnimationFrame(scan);
}

/* ---------------- ANSWER ---------------- */
async function handleAnswer(text){

  if(!text.startsWith("WG:ANSWER:")) return;

  const raw = text.split("WG:ANSWER:")[1];
  const answer = JSON.parse(atob(raw));

  await pc.setRemoteDescription(answer);

  notify("✅ Connected");
  document.getElementById("status").textContent = "Connected 🎮";
}

/* ---------------- RENDER LOOP ---------------- */
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#4ade80";
  ctx.fillRect(x,y,40,40);
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
