<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Emotify v4</title>
<style>
:root{
--bg:#202124;
--panel:#2b2d31;
--panel2:#313338;
--border:#45474d;
--text:#f2f3f5;
--accent:#7c8cff;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif}
#top{padding:12px;display:flex;gap:8px;flex-wrap:wrap;background:var(--panel);border-bottom:1px solid var(--border)}
button,input{padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);color:var(--text)}
button:hover{cursor:pointer;filter:brightness(1.08)}
#wrap{display:flex;height:calc(100vh - 65px)}
#left{width:320px;padding:12px;background:var(--panel);border-right:1px solid var(--border);overflow:auto}
#chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:var(--panel2);border:1px solid var(--border);padding:6px 10px;border-radius:999px}
canvas{width:100%;height:100%;display:block;touch-action:none}
#stage{flex:1}
@media(max-width:900px){
#wrap{flex-direction:column;height:auto}
#left{width:100%;order:2;border-right:none;border-top:1px solid var(--border)}
#stage{order:1;height:70vh}
}
</style>
</head>
<body>
<div id="top">
<input id="tokenInput" style="min-width:260px" value="😂🔥💀🤡🥺XDLOLWTF"><input type="file" id="upload" accept="image/*">
<button id="spin">🎰 Random</button><button id="placeMode">📍 Place</button><button id="editMode">✏️ Edit</button>
<button id="pngBtn">🖼 Export PNG</button>
<button id="gifBtn">🎞 Export Animation (GIF)</button>
<button id="rotateLeft">↺ Rotate</button><button id="rotateRight">↻ Rotate</button><button id="deleteBtn">🗑 Delete</button><span id="status"></span>
</div>

<div id="wrap">
<div id="left">
<h3>Emoticons</h3>
<div id="chips"></div>
<br>
<button onclick="autoFill(25)">Fill 25</button>
<button onclick="autoFill(100)">Fill 100</button>
<button onclick="autoFill(300)">Fill 300</button>
<p>Type emoji, words, or both. No separators required.</p>
</div>
<div id="stage"><canvas id="c"></canvas></div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const upload=document.getElementById('upload');
const spin=document.getElementById('spin');
const pngBtn=document.getElementById('pngBtn');
const gifBtn=document.getElementById('gifBtn');
const tokenInput=document.getElementById('tokenInput');
const chips=document.getElementById('chips');
const status=document.getElementById('status');
const rotateLeft=document.getElementById('rotateLeft');
const rotateRight=document.getElementById('rotateRight');
const deleteBtn=document.getElementById('deleteBtn');

setTimeout(()=>{
const placeBtn=document.getElementById('placeMode');
const editBtn=document.getElementById('editMode');

if(placeBtn) placeBtn.onclick=()=>{mode='place';status.textContent='Place mode';};
if(editBtn) editBtn.onclick=()=>{mode='edit';status.textContent='Edit mode';};

canvas.addEventListener('click',e=>{
 const r=canvas.getBoundingClientRect();
 const x=e.clientX-r.left;
 const y=e.clientY-r.top;

 if(mode==='place'){
   const tokens=parseTokens(tokenInput.value);
   const choice=prompt('Emoji/text:\n'+tokens.join(' '), tokens[0]||'😂');
   if(!choice) return;

   items.push({
      x,y,
      text:choice,
      size:60,
      width:120,
      height:120,
      rotation:0
   });
   draw();
   return;
 }

 if(mode==='edit'){
   selected=null;
   for(let i=items.length-1;i>=0;i--){
      const it=items[i];
      const w=it.width||it.size;
      const h=it.height||it.size;
      if(Math.abs(x-it.x)<=w/2 && Math.abs(y-it.y)<=h/2){
         selected=it;
         break;
      }
   }
   draw();
 }
});

canvas.addEventListener('pointerdown',()=>{
 if(mode==='edit' && selected) dragging=true;
});

canvas.addEventListener('pointerup',()=>dragging=false);

canvas.addEventListener('pointermove',e=>{
 if(!dragging || !selected) return;
 const r=canvas.getBoundingClientRect();
 selected.x=e.clientX-r.left;
 selected.y=e.clientY-r.top;
 draw();
});

canvas.addEventListener('wheel',e=>{
 if(!selected) return;
 e.preventDefault();

 if(e.shiftKey){
   selected.rotation += e.deltaY*0.01;
 }else if(e.altKey){
   selected.size=Math.max(10,(selected.size||60)-e.deltaY*0.05);
 }else{
   selected.width=Math.max(20,(selected.width||120)-e.deltaY*0.2);
   selected.height=Math.max(20,(selected.height||120)-e.deltaY*0.2);
 }
 draw();
},{passive:false});

document.addEventListener('keydown',e=>{
 if((e.key==='Delete' || e.key==='Backspace') && selected){
   items=items.filter(x=>x!==selected);
   selected=null;
   draw();
 }
});

rotateLeft.onclick=()=>{
 if(!selected) return;
 selected.rotation=(selected.rotation||0)-Math.PI/18;
 draw();
};

rotateRight.onclick=()=>{
 if(!selected) return;
 selected.rotation=(selected.rotation||0)+Math.PI/18;
 draw();
};

deleteBtn.onclick=()=>{
 if(!selected) return;
 items=items.filter(x=>x!==selected);
 selected=null;
 draw();
};
},0);

let bg=null,bgW=0,bgH=0,items=[];
let mode='random';
let selected=null;
let dragging=false;

function resize(){
canvas.width=canvas.parentElement.clientWidth;
canvas.height=canvas.parentElement.clientHeight;
draw();
}
onresize=resize;resize();

function parseTokens(str){
const m=str.match(/\p{Extended_Pictographic}|[A-Za-z0-9_]+/gu);
return m||["😂"];
}

function refreshChips(){
chips.innerHTML="";
parseTokens(tokenInput.value).forEach(t=>{
const d=document.createElement('span');
d.className='chip';
d.textContent=t;
chips.appendChild(d);
});
}
refreshChips();
tokenInput.oninput=refreshChips;

upload.onchange=e=>{
const f=e.target.files[0];
if(!f)return;
const r=new FileReader();
r.onload=v=>{
bg=new Image();
bg.onload=()=>{bgW=bg.width;bgH=bg.height;draw();};
bg.src=v.target.result;
};
r.readAsDataURL(f);
};

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(bg){
const s=Math.min(canvas.width/bg.width,canvas.height/bg.height);
const w=bg.width*s,h=bg.height*s;
ctx.drawImage(bg,(canvas.width-w)/2,(canvas.height-h)/2,w,h);
}
ctx.textAlign='center';
ctx.textBaseline='middle';
items.forEach(i=>{
ctx.save();
ctx.translate(i.x,i.y);
ctx.rotate(i.rotation||0);
ctx.font=(i.size||60)+'px Arial';
ctx.fillText(i.text,0,0);

if(i===selected){
 const w=i.width||120;
 const h=i.height||120;
 ctx.strokeStyle='#7c8cff';
 ctx.lineWidth=2;
 ctx.strokeRect(-w/2,-h/2,w,h);
}
ctx.restore();
});
}

function autoFill(n){
const lib=parseTokens(tokenInput.value);
for(let i=0;i<n;i++){
items.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:20+Math.random()*40,
text:lib[Math.floor(Math.random()*lib.length)]
});
}
draw();
}

async function spinAnim(ms=2500){
const lib=parseTokens(tokenInput.value);
const end=Date.now()+ms;
while(Date.now()<end){
items.forEach(i=>i.text=lib[Math.floor(Math.random()*lib.length)]);
draw();
await new Promise(r=>setTimeout(r,60));
}
}

spin.onclick=()=>spinAnim();

pngBtn.onclick=()=>{
const ec=document.createElement('canvas');
const ex=ec.getContext('2d');
let w=bgW||canvas.width,h=bgH||canvas.height;
let s=Math.min(1000/w,1000/h,1);
ec.width=Math.round(w*s);
ec.height=Math.round(h*s);

if(bg) ex.drawImage(bg,0,0,ec.width,ec.height);

items.forEach(i=>{
ex.font=(i.size*s)+'px Arial';
ex.textAlign='center';
ex.textBaseline='middle';
ex.fillText(i.text,(i.x/canvas.width)*ec.width,(i.y/canvas.height)*ec.height);
});

const a=document.createElement('a');
a.href=ec.toDataURL('image/png');
a.download='emotify.png';
a.click();
};


gifBtn.onclick=async()=>{
status.textContent='Creating GIF...';

const recordCanvas=document.createElement('canvas');
const rctx=recordCanvas.getContext('2d');

const exportScale=Math.min(0.5, 1200/Math.max(bgW||canvas.width,bgH||canvas.height));

recordCanvas.width=Math.max(600,Math.round((bgW||canvas.width)*exportScale));
recordCanvas.height=Math.max(400,Math.round((bgH||canvas.height)*exportScale));

function drawRecord(){
rctx.clearRect(0,0,recordCanvas.width,recordCanvas.height);

if(bg){
rctx.drawImage(bg,0,0,recordCanvas.width,recordCanvas.height);
}

rctx.textAlign='center';
rctx.textBaseline='middle';

items.forEach(i=>{
const x=(i.x/canvas.width)*recordCanvas.width;
const y=(i.y/canvas.height)*recordCanvas.height;
const size=i.size*(recordCanvas.width/canvas.width);

rctx.font=size+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
rctx.strokeStyle='rgba(0,0,0,.45)';
rctx.lineWidth=Math.max(1,size*0.06);
rctx.strokeText(i.text,x,y);
rctx.fillText(i.text,x,y);
});
}

const gif=new GIF({
workers:2,
quality:10,
width:recordCanvas.width,
height:recordCanvas.height,
workerScript:'worker.js'
});

gif.on('progress',p=>{
status.textContent='Encoding GIF '+Math.round(p*100)+'%';
});

gif.on('error',e=>{
console.error('GIF ERROR',e);
status.textContent='GIF Error';
});

const lib=parseTokens(tokenInput.value);
const end=Date.now()+3000;

while(Date.now()<end){
items.forEach(i=>{
i.text=lib[Math.floor(Math.random()*lib.length)];
});

draw();
drawRecord();

gif.addFrame(recordCanvas,{
copy:true,
delay:80
});

await new Promise(r=>setTimeout(r,80));
}

gif.on('finished',blob=>{
console.log('GIF FINISHED',blob);

const url=URL.createObjectURL(blob);
const a=document.createElement('a');

a.href=url;
a.download='emotify.gif';

document.body.appendChild(a);
a.click();
a.remove();

setTimeout(()=>URL.revokeObjectURL(url),5000);

status.textContent='Done';
});

gif.render();
};

</script>
<script src="gif.js"></script>
</body>
</html>
