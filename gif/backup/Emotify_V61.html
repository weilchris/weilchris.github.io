<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Emotify V6.1</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:system-ui}
#top{padding:10px;background:#1b1b1b;display:flex;gap:8px;flex-wrap:wrap}
#left{width:340px;background:#1a1a1a;padding:10px;overflow:auto;height:calc(100vh - 60px)}
#wrap{display:flex}
#stage{flex:1}
canvas{width:100%;height:100vh;display:block}
button,input{padding:10px;border-radius:10px;border:none}
.emoji{display:inline-block;padding:4px;font-size:24px;cursor:pointer}
.sel{outline:2px solid #7c8cff;border-radius:6px}
</style>
</head>
<body>
<div id="top">
<input type="file" id="upload" accept="image/*">
<button id="exportGIF">Export GIF</button>
<button id="exportPNG">Export PNG</button>
<span id="status"></span>
</div>

<div id="wrap">
<div id="left">
<h3>Emoji Library</h3>
<p>All common emojis are available by default.</p>
<div id="emojis"></div>
</div>
<div id="stage"><canvas id="c"></canvas></div>
</div>

<script src="gif.js"></script>
<script>
const ALL="😀😁😂🤣😃😄😅😆😉😊😋😎😍😘🥰😗😙🥲🤩🤔🤨😐😑🙄😏😣😥😭😱🤯🥳😈👀💀🤡👻❤️🧡💛💚💙💜🖤🤍🔥✨⭐🌈⚡🍕🍔🚀🎉🎨📚🎵".match(/./gu);

let selected=["😀","😂","🔥"];
const wrap=document.getElementById('emojis');

ALL.forEach(e=>{
 let s=document.createElement('span');
 s.className='emoji';
 s.textContent=e;
 if(selected.includes(e))s.classList.add('sel');
 s.onclick=()=>{
   s.classList.toggle('sel');
   selected=[...document.querySelectorAll('.sel')].map(x=>x.textContent);
 };
 wrap.appendChild(s);
});

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){
 canvas.width=window.innerWidth-340;
 canvas.height=window.innerHeight;
}
resize(); onresize=resize;

let bg=null,imgRect={},slots=[];

upload.onchange=e=>{
 const f=e.target.files[0];
 const r=new FileReader();
 r.onload=()=>{
   bg=new Image();
   bg.onload=()=>{
     const s=Math.min(canvas.width/bg.width,canvas.height/bg.height);
     imgRect={
      x:(canvas.width-bg.width*s)/2,
      y:(canvas.height-bg.height*s)/2,
      w:bg.width*s,
      h:bg.height*s
     };
   };
   bg.src=r.result;
 };
 r.readAsDataURL(f);
};

canvas.onclick=e=>{
 slots.push({
  x:e.offsetX,y:e.offsetY,size:60,
  frame:Math.random()*100,speed:.08+Math.random()*.2
 });
};

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(bg) ctx.drawImage(bg,imgRect.x,imgRect.y,imgRect.w,imgRect.h);

 slots.forEach(s=>{
   s.frame+=s.speed;
   const emoji=selected[Math.floor(s.frame)%selected.length]||"😀";
   ctx.font=s.size+"px sans-serif";
   ctx.textAlign='center';
   ctx.textBaseline='middle';
   ctx.fillText(emoji,s.x,s.y);
 });

 requestAnimationFrame(draw);
}
draw();

exportPNG.onclick=()=>{
 const a=document.createElement('a');
 a.href=canvas.toDataURL();
 a.download='emotify.png';
 a.click();
};

exportGIF.onclick=()=>{
 if(typeof GIF==="undefined"){alert("gif.js missing");return;}

 const status=document.getElementById('status');

 const rec=document.createElement('canvas');
 rec.width=bg?bg.width:1200;
 rec.height=bg?bg.height:800;
 const rctx=rec.getContext('2d');

 const gif=new GIF({
   workers:2,
   quality:10,
   width:rec.width,
   height:rec.height,
   workerScript:'worker.js'
 });

 for(let f=0;f<60;f++){

   rctx.clearRect(0,0,rec.width,rec.height);

   if(bg) rctx.drawImage(bg,0,0,rec.width,rec.height);

   slots.forEach(s=>{
      s.frame+=s.speed*2;
      const emoji=selected[Math.floor(s.frame)%selected.length]||"😀";

      const x=((s.x-imgRect.x)/imgRect.w)*rec.width;
      const y=((s.y-imgRect.y)/imgRect.h)*rec.height;

      rctx.font=(s.size*rec.width/canvas.width)+'px sans-serif';
      rctx.fillText(emoji,x,y);
   });

   gif.addFrame(rec,{copy:true,delay:80});
 }

 gif.on('progress',p=>status.textContent='Encoding '+Math.round(p*100)+'%');

 gif.on('finished',blob=>{
   const a=document.createElement('a');
   a.href=URL.createObjectURL(blob);
   a.download='emotify.gif';
   a.click();
   status.textContent='Done';
 });

 gif.render();
};
</script>
</body>
</html>
