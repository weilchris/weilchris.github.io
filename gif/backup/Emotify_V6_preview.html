<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Emotify V6</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:system-ui}
#top{padding:10px;background:#1b1b1b;display:flex;gap:8px;flex-wrap:wrap}
button,input{padding:10px;border-radius:10px;border:0}
#wrap{display:flex;height:calc(100vh - 60px)}
#left{width:320px;background:#1a1a1a;padding:10px;overflow:auto}
#stage{flex:1}
canvas{width:100%;height:100%;display:block}
.emoji{font-size:28px;cursor:pointer;padding:4px;display:inline-block}
.sel{outline:2px solid #7c8cff;border-radius:8px}
</style>
</head>
<body>
<div id="top">
<input type="file" id="upload" accept="image/*">
<button id="manual">Manual</button>
<button id="random">Random Fill</button>
<button id="exportPNG">Export PNG</button>
</div>

<div id="wrap">
<div id="left">
<h3>Emoji Set</h3>
<div id="emojis"></div>
</div>
<div id="stage"><canvas id="c"></canvas></div>
</div>

<script>
const EMOJIS=["😀","😂","🤣","😍","🥺","😎","🔥","💀","🤡","👀","❤️","✨","🎉","😭","🚀","🌈"];
let selected=["😀","😂","🔥"];
const ewrap=document.getElementById("emojis");

EMOJIS.forEach(e=>{
 let d=document.createElement("span");
 d.className="emoji sel";
 d.textContent=e;
 d.onclick=()=>{
   d.classList.toggle("sel");
   selected=[...document.querySelectorAll(".sel")].map(x=>x.textContent);
 };
 ewrap.appendChild(d);
});

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=canvas.parentElement.clientWidth;
 canvas.height=canvas.parentElement.clientHeight;
}
resize(); onresize=resize;

let bg=null;
let imgRect={x:0,y:0,w:0,h:0};
let slots=[];
let mode="manual";

upload.onchange=e=>{
 const f=e.target.files[0];
 if(!f)return;
 const r=new FileReader();
 r.onload=()=>{
   bg=new Image();
   bg.onload=fitImage;
   bg.src=r.result;
 };
 r.readAsDataURL(f);
};

function fitImage(){
 const s=Math.min(canvas.width/bg.width,canvas.height/bg.height);
 imgRect.w=bg.width*s;
 imgRect.h=bg.height*s;
 imgRect.x=(canvas.width-imgRect.w)/2;
 imgRect.y=(canvas.height-imgRect.h)/2;
}

document.getElementById("manual").onclick=()=>mode="manual";

document.getElementById("random").onclick=()=>{
 mode="random";
 slots=[];
 for(let i=0;i<150;i++){
   slots.push({
     x:imgRect.x+Math.random()*imgRect.w,
     y:imgRect.y+Math.random()*imgRect.h,
     size:20+Math.random()*40,
     frame:Math.random()*100
   });
 }
};

canvas.onclick=e=>{
 if(mode!=="manual") return;
 slots.push({
   x:e.offsetX,
   y:e.offsetY,
   size:60,
   frame:Math.random()*100
 });
};

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(bg){
   ctx.drawImage(bg,imgRect.x,imgRect.y,imgRect.w,imgRect.h);
 }

 slots.forEach(s=>{
   s.frame+=0.12;
   const emoji=selected.length
      ? selected[Math.floor(s.frame)%selected.length]
      : "😀";

   ctx.font=s.size+"px sans-serif";
   ctx.textAlign="center";
   ctx.textBaseline="middle";
   ctx.fillText(emoji,s.x,s.y);
 });
 requestAnimationFrame(draw);
}
draw();

document.getElementById("exportPNG").onclick=()=>{
 const a=document.createElement("a");
 a.href=canvas.toDataURL("image/png");
 a.download="emotify.png";
 a.click();
};
</script>
</body>
</html>
