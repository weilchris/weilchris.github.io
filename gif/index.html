<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sacrisoft GIF Emotify™ – Generate Infinite Fun</title>
<style>
:root{
  --bg:#111;
  --top:#1b1b1b;
  --panel:#1a1a1a;
  --panel-dark:#222;
  --border:#333;
  --border-light:#444;
  --text:#fff;
  --accent:#7c8cff;
}

/* ---------- Layout ---------- */

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
}

#top{
  padding:10px;
  background:var(--top);
  display:flex;
  gap:8px;
  align-items:center;
}

#wrap{
  display:flex;
  height:calc(100vh - 56px);
}

#left{
  width:360px;
  background:var(--panel);
  overflow:auto;
  padding:10px;
}

#stage{flex:1}

canvas{
  width:100%;
  height:100%;
  display:block;
}

/* ---------- Categories ---------- */

.cat{margin:8px 0}

.cat h4{
  margin:8px 0;
}

.emoji{
  display:inline-block;
  padding:4px;
  font-size:24px;
  cursor:pointer;
}

.sel{
  outline:2px solid var(--accent);
  border-radius:6px;
}

/* ---------- Normal Inputs ---------- */

input:not([type="file"]){
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ---------- Buttons ---------- */

button{
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ---------- File Input ---------- */

input[type="file"]{
  padding:0;
  border:none;
  background:none;
  color:var(--text);
}

/* Native Choose File button */

input[type="file"]::file-selector-button,
input[type="file"]::-webkit-file-upload-button{
  background:#fff;
  color:#111;
  border:1px solid #333;
  border-radius:999px;
  padding:10px 16px;
  cursor:pointer;
  margin-right:12px;
}

input[type="file"]::file-selector-button:hover{
  background:#000;
  color:#fff;
}

/* ---------- Modal ---------- */

#modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.75);
  z-index:9999;
}

#modalBox{
  background:var(--panel-dark);
  border:1px solid var(--border-light);
  border-radius:16px;
  padding:20px;
  min-width:320px;
  color:var(--text);
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

#modalOk{
  margin-top:15px;
  width:100%;
  background:var(--border);
  color:var(--text);
  cursor:pointer;
}

/* ---------- Rainbow Button ---------- */

.btn{
  cursor:pointer;
  font-weight:800;
  color:#fff;
  border-radius:999px;

  background:linear-gradient(
    270deg,
    red,
    orange,
    yellow,
    green,
    cyan,
    blue,
    violet,
    red
  );

  background-size:400% 400%;
  animation:rainbowFlow 6s ease infinite;

  box-shadow:0 12px 35px rgba(0,0,0,.35);
}

.btn:hover{
  transform:translateY(-1px) scale(1.01);
}

/* ---------- Grey Button ---------- */

.btn.secondary{
  animation:none !important;
  background:#232324 !important;
  border:1px solid rgba(255,255,255,.16);
  color:#fff;
  box-shadow:none;
}

/* ---------- Animation ---------- */

@keyframes rainbowFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
</style>
</head>

const browser=document.getElementById("browser");
let currentPalette=[];
let selectedSlot=null;
let editTimer=null;
const EDIT_TIMEOUT=5000;

function resetEditTimeout(){
 clearTimeout(editTimer);
 if(!selectedSlot) return;
 const target=selectedSlot;
 editTimer=setTimeout(()=>{
   if(selectedSlot===target){
      selectedSlot=null;
      draggingSlot=null;
   }
 },EDIT_TIMEOUT);
}

for(const [name,str] of Object.entries(CATS)){
 const div=document.createElement('div');
 div.className='cat';
 div.innerHTML='<h4>'+name+'</h4>';
 const emojis=[...new Intl.Segmenter(undefined,{granularity:'grapheme'}).segment(str)].map(x=>x.segment);
 emojis.forEach(e=>{
   const s=document.createElement('span');
   s.className='emoji';
   s.textContent=e;

   s.onclick=()=>{
      s.classList.toggle('sel');

      const pool=[...document.querySelectorAll('.emoji.sel')].map(x=>x.textContent);

      if(selectedSlot){
         selectedSlot.pool=[...pool];
      }else{
         currentPalette=[...pool];
      }
   };
   div.appendChild(s);
 });
 browser.appendChild(div);
}


const nativeBtn=document.getElementById('nativeEmoji');
const nativeInput=document.getElementById('emojiInputNative');
const deleteFloat=document.getElementById('deleteFloat');

function showModal(msg){
 const m=document.getElementById('modal');
 document.getElementById('modalText').innerHTML=msg;
 m.style.display='flex';
}
document.addEventListener('click',e=>{
 if(e.target && e.target.id==='modalOk'){
   document.getElementById('modal').style.display='none';
 }
});

nativeBtn.onclick=()=>{
 nativeInput.focus();
showModal(`
<b>Mac:</b> Ctrl + Cmd + Space
&nbsp; &nbsp; 
<b>Windows:</b> Win +
`);
};

nativeInput.addEventListener('input',()=>{
 const emoji=nativeInput.value.trim();
 if(!emoji) return;

 const s=document.createElement('span');
 s.className='emoji sel';
 s.textContent=emoji;
 s.onclick=()=>s.classList.toggle('sel');
 browser.prepend(s);

 currentPalette.push(emoji);
 nativeInput.value='';
});

deleteFloat.onclick=()=>{
 if(!selectedSlot) return;
 slots=slots.filter(s=>s!==selectedSlot);
 selectedSlot=null;
};

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function resize(){
 canvas.width=window.innerWidth-360;
 canvas.height=window.innerHeight-56;
}
resize();
window.onresize=resize;

let bg=null,imgRect={x:0,y:0,w:1,h:1},slots=[];

upload.onchange=e=>{
 const f=e.target.files[0];
 if(!f)return;

 const r=new FileReader();
 r.onload=()=>{
   bg=new Image();
   bg.onload=()=>{
      const s=Math.min(canvas.width/bg.width,canvas.height/bg.height);
      imgRect.w=bg.width*s;
      imgRect.h=bg.height*s;
      imgRect.x=(canvas.width-imgRect.w)/2;
      imgRect.y=(canvas.height-imgRect.h)/2;
   };
   bg.src=r.result;
 };
 r.readAsDataURL(f);
};

function hit(x,y){
 for(let i=slots.length-1;i>=0;i--){
   const s=slots[i];
   if(Math.hypot(x-s.x,y-s.y)<s.size*.7)return s;
 }
 return null;
}

canvas.onclick=e=>{
 const h=hit(e.offsetX,e.offsetY);

if(h){

   selectedSlot=h;
   resetEditTimeout();

   document.querySelectorAll('.emoji').forEach(x=>x.classList.remove('sel'));

   h.pool.forEach(em=>{
      document.querySelectorAll('.emoji').forEach(el=>{
         if(el.textContent===em) el.classList.add('sel');
      });
   });

   return;
}

 if(currentPalette.length===0){
   showModal('Select emoticons first');
   return;
 }

 selectedSlot=null;

 slots.push({
   x:e.offsetX,
   y:e.offsetY,
   size:90,
   frame:0,
   index:0,
   pool:[...currentPalette]
 });
};


let draggingSlot=null;

canvas.addEventListener('pointerdown',e=>{
 const h=hit(e.offsetX,e.offsetY);
 if(h){
   selectedSlot=h;
   draggingSlot=h;
   resetEditTimeout();
 }
});

canvas.addEventListener('pointermove',e=>{
 if(!draggingSlot) return;
 draggingSlot.x=e.offsetX;
 draggingSlot.y=e.offsetY;
 resetEditTimeout();
});

window.addEventListener('pointerup',()=>{
 draggingSlot=null;
});

canvas.addEventListener('wheel',e=>{
 const h=hit(e.offsetX,e.offsetY);
 if(!h)return;
 e.preventDefault();
 h.size=Math.max(20,h.size-e.deltaY*0.05);
 resetEditTimeout();
},{passive:false});



function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(bg)ctx.drawImage(bg,imgRect.x,imgRect.y,imgRect.w,imgRect.h);

 slots.forEach(s=>{
   s.frame=(s.frame||0)+1;
   if(s.frame>=6){
      s.frame=0;
      s.index=((s.index||0)+1)%Math.max(1,s.pool.length);
   }

   const emoji=s.pool.length
     ? s.pool[s.index||0]
     : "😀";

   ctx.font=s.size+'px sans-serif';
   ctx.textAlign='center';
   ctx.textBaseline='middle';
   ctx.fillText(emoji,s.x,s.y);

   if(s===selectedSlot){
      ctx.strokeStyle='#7c8cff';
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size*.7,0,Math.PI*2);
      ctx.stroke();
      deleteFloat.style.display='block';
      deleteFloat.style.left=(s.x+s.size/2+6)+'px';
      deleteFloat.style.top=(s.y-s.size/2-8)+'px';
   }
 });

 if(!selectedSlot) deleteFloat.style.display='none';
 requestAnimationFrame(draw);
}
draw();

exportGIF.onclick=async()=>{
 if(typeof GIF==="undefined"){showModal("gif.js missing");return;}

 const status=document.getElementById('status');
 status.textContent='Creating GIF...';

 const rec=document.createElement('canvas');
 const rctx=rec.getContext('2d',{willReadFrequently:true});

 if(bg){
   rec.width=Math.round(imgRect.w);
   rec.height=Math.round(imgRect.h);
 }else{
   rec.width=canvas.width;
   rec.height=canvas.height;
 }

 const gif=new GIF({
   workers:2,
   quality:10,
   width:rec.width,
   height:rec.height,
   workerScript:'worker.js'
 });

 gif.on('progress',p=>{
   status.textContent='Encoding '+Math.round(p*100)+'%';
 });

 gif.on('finished',blob=>{
   const a=document.createElement('a');
   a.href=URL.createObjectURL(blob);
   a.download='emotify.gif';
   a.click();
   status.textContent='Done';
 });

 for(let f=0;f<120;f++){

   rctx.clearRect(0,0,rec.width,rec.height);

   if(bg){
      rctx.drawImage(bg,0,0,rec.width,rec.height);
   }

   slots.forEach(s=>{

      if(!s.pool || !s.pool.length) return;

      const emoji=s.pool[Math.floor(f/6)%s.pool.length];

      const x=bg ? (s.x-imgRect.x) : s.x;
      const y=bg ? (s.y-imgRect.y) : s.y;

      rctx.font=s.size+'px sans-serif';
      rctx.textAlign='center';
      rctx.textBaseline='middle';
      rctx.fillText(emoji,x,y);
   });

   gif.addFrame(rec,{
      copy:true,
      delay:16
   });
 }

 gif.render();
};
</script>
